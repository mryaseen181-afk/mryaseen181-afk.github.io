<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuraHub Pro - Mobile Edition</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-secondary: #334155;
            --border-color: #475569;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --accent-purple: #818cf8;
            --accent-rose: #fb7185;
            --story-gradient: linear-gradient(135deg, #c084fc 0%, #6366f1 50%, #38bdf8 100%);
            --verified-color: #0095f6;
            --admin-glow: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        #loading-screen { 
            color: var(--text-muted); 
            font-size: 16px; 
            font-weight: 500; 
        }

        /* Mobile Frame enforcement */
        .dashboard-layout, .form-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 920px;
            background: var(--bg-card);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        @media (min-width: 480px) {
            .dashboard-layout, .form-container {
                border: 1px solid var(--border-color);
                border-radius: 32px;
                height: 92vh;
            }
        }

        .form-container {
            padding: 24px;
            justify-content: center;
            align-items: center;
        }

        .app-logo-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 24px;
            background: var(--story-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-navbar {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg-card);
            flex-shrink: 0;
        }

        .nav-brand { 
            font-weight: 900; 
            font-size: 20px; 
            letter-spacing: -0.5px;
        }

        .mobile-bottom-tabs {
            height: 64px;
            border-top: 1px solid var(--border-color);
            display: flex;
            background: var(--bg-card);
            flex-shrink: 0;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--accent-glow);
        }

        .main-content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .sidebar, .chat-area, .feed-area, .search-tab-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: var(--bg-main);
        }

        .sidebar { display: flex; } /* Initial Tab */

        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
        }
        
        .user-bar img { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--border-color); 
        }
        
        .user-details h3 { 
            font-size: 13px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }

        .story-tray {
            display: flex;
            gap: 12px;
            padding: 12px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            flex-shrink: 0;
        }

        .story-tray::-webkit-scrollbar { display: none; }
        
        .story-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 56px; 
        }
        
        .story-avatar-wrap {
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            padding: 2px;
            background: var(--story-gradient); 
        }
        
        .story-avatar-wrap img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            background: var(--bg-card); 
            padding: 2px; 
        }
        
        .story-item span { 
            font-size: 10px; 
            margin-top: 4px; 
            max-width: 56px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            color: var(--text-muted); 
        }

        .friends-list-container { 
            flex: 1; 
            overflow-y: auto; 
        }

        .friend-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .friend-item img { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            object-fit: cover; 
        }
        
        .friend-item .info h4 { 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }

        .messages-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .msg { 
            max-width: 75%; 
            padding: 10px 14px; 
            border-radius: 16px; 
            font-size: 14px; 
            position: relative;
        }
        
        .msg.sent { 
            background: var(--accent-purple); 
            align-self: flex-end; 
        }
        
        .msg.received { 
            background: var(--bg-secondary); 
            align-self: flex-start; 
        }

        .msg-meta-row { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end;
            gap: 4px; 
            margin-top: 4px; 
            font-size: 9px; 
            color: var(--text-muted);
        }

        /* Read Receipts Double Check Vector Styles */
        .read-receipt-ticks {
            display: inline-flex;
            align-items: center;
            width: 14px;
            height: 10px;
        }
        .read-receipt-ticks svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .read-receipt-ticks.seen {
            color: #38bdf8; /* Double Blue Ticks */
        }
        .read-receipt-ticks.unseen {
            color: #64748b; /* Single Gray Tick fallback */
        }

        .chat-input-wrapper { 
            padding: 12px; 
            background: var(--bg-card); 
            border-top: 1px solid var(--border-color); 
        }
        
        .chat-input-container {
            background: var(--bg-secondary); 
            border-radius: 24px; 
            padding: 6px 14px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        
        .chat-input-container input[type="text"] { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: var(--text-color); 
            outline: none; 
            font-size: 14px;
        }

        .insta-post { 
            background: var(--bg-card); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 12px;
        }

        .post-media { 
            width: 100%; 
            max-height: 340px; 
            object-fit: cover; 
        }

        .verified-badge-texture-star {
            width: 15px; 
            height: 15px; 
            display: inline-block; 
            vertical-align: middle; 
        }

        .admin-badge-indicator {
            background: var(--admin-glow);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 4px;
        }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(2,6,23,0.8); 
            backdrop-filter: blur(4px); 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }
        
        .modal-content { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
        }

        .profile-posts-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 4px; 
            max-height: 180px; 
            overflow-y: auto; 
        }
        
        .profile-grid-item { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: cover; 
            border-radius: 4px; 
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            outline: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">Syncing spatial core databases...</div>

    <div id="login-container" class="form-container" style="display: none;">
        <div class="app-logo-title">AuraHub Pro</div>
        <div class="input-group" style="width: 100%;">
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
        </div>
        <button id="email-primary-btn" class="main-btn" style="padding: 12px;">Sign In</button>
        <button id="auth-toggle-mode-btn" class="secondary-btn" style="padding: 12px;">Create New Account</button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <div class="app-logo-title">Profile Matrix</div>
        <form id="profile-form" style="width: 100%;">
            <div class="input-group">
                <input type="text" id="setup-username" placeholder="Username" required>
                <input type="text" id="setup-name" placeholder="Full Name" required>
            </div>
            <button type="submit" class="main-btn" style="padding: 12px;">Complete Setup</button>
        </form>
    </div>

    <div id="dashboard-container" class="dashboard-layout" style="display: none;">
        <div class="app-navbar">
            <div class="nav-brand">AuraHub Pro</div>
            <button onclick="requestPushNotificationPerms()" style="background:none; border:none; color:var(--accent-glow); font-size:11px; font-weight:bold;">🔔 Enable Alerts</button>
        </div>

        <div class="main-content-area">
            <div class="sidebar" id="app-sidebar-pane">
                <div class="user-bar">
                    <img id="dash-avatar" src="" onclick="openMyOwnProfile()" alt="Avatar">
                    <div class="user-details" onclick="openMyOwnProfile()">
                        <h3 id="dash-username">@username</h3>
                    </div>
                    <label for="status-file-input" style="margin-left:auto; color:var(--accent-glow);">
                        <svg viewBox="0 0 24 24" style="width:24px; height:24px;"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </label>
                    <input type="file" id="status-file-input" accept="image/*,video/*" style="display:none;">
                </div>
                <div id="status-tray" class="story-tray"></div>
                <div class="friends-list-container">
                    <div id="friends-list"></div>
                </div>
            </div>

            <div class="chat-area" id="app-chat-pane">
                <div class="chat-header" style="height:54px; padding:0 12px; border-bottom:1px solid var(--border-color); display:flex; align-items:center; background:var(--bg-card);">
                    <button onclick="exitChatToSidebar()" style="background:none; border:none; color:white; margin-right:10px; font-size:14px;">Back</button>
                    <h3 id="chat-with-heading" style="font-size:15px;">Chat</h3>
                    <span id="chat-typing-indicator" class="typing-indicator-span" style="font-size:10px; margin-left:6px; color:var(--accent-glow); display:none;">typing...</span>
                </div>
                <div id="messages-box" class="messages-box"></div>
                <div class="chat-input-wrapper">
                    <div class="chat-input-container">
                        <input type="text" id="message-input" placeholder="Message...">
                        <button id="send-msg-btn" class="send-txt-btn">Send</button>
                    </div>
                </div>
            </div>

            <div class="feed-area" id="app-feed-pane" style="overflow-y:auto;">
                <div class="feed-composer" style="padding:12px; background:var(--bg-card); margin-bottom:8px;">
                    <textarea id="feed-post-text" placeholder="What's happening?" style="width:100%; height:50px; background:transparent; border:none; color:white; outline:none; resize:none;"></textarea>
                    <button class="main-btn" style="padding:6px 12px; width:auto; margin-left:auto; display:block; font-size:12px;" id="submit-feed-post-btn">Post</button>
                </div>
                <div id="feed-posts-container"></div>
            </div>

            <div class="search-tab-area" id="app-search-pane" style="overflow-y:auto; padding:12px;">
                <input type="text" class="search-input-box" id="hub-main-search-bar" placeholder="Search creators..." style="padding:12px; margin-bottom:12px;">
                <div id="search-creators-results"></div>
            </div>

            <div class="feed-area" id="app-admin-pane" style="overflow-y:auto; padding:16px;">
                <h3 style="color:var(--admin-glow); margin-bottom:10px;">Admin Command Console</h3>
                <input type="text" id="admin-command-input" placeholder="Type /verify-all or /verify [username]" style="width:100%; padding:10px; margin-bottom:10px; background:var(--bg-card); border:1px solid var(--border-color); color:white; border-radius:8px;">
                <button class="main-btn" id="admin-command-submit-btn" style="background:var(--admin-glow); color:black;">Run Script</button>
            </div>
        </div>

        <div class="mobile-bottom-tabs">
            <button id="tab-btn-chats" class="tab-btn active" onclick="switchTab('chats')">Messages</button>
            <button id="tab-btn-feed" class="tab-btn" onclick="switchTab('feed')">Feed</button>
            <button id="tab-btn-search" class="tab-btn" onclick="switchTab('search')">Search</button>
            <button id="tab-btn-admin" class="tab-btn" onclick="switchTab('admin')" style="display:none; color:var(--admin-glow);">Admin</button>
            <button onclick="triggerLogoutSession()" class="tab-btn" style="color:var(--accent-rose);">Logout</button>
        </div>
    </div>

    <div id="view-profile-modal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeViewProfileModal()">&times;</span>
            <div class="profile-modal-hdr">
                <h2 id="view-modal-name">Profile</h2>
                <p id="view-modal-username" style="color:var(--accent-glow); margin-bottom:10px;"></p>
                <div id="view-modal-description" style="font-size:12px; margin-bottom:10px;"></div>
                <button id="profile-action-follow-toggle-btn" class="main-btn" style="padding:6px; font-size:12px;"></button>
            </div>
            <div id="profile-posts-grid" class="profile-posts-grid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loadingScreen = document.getElementById('loading-screen');
        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const friendsListElement = document.getElementById('friends-list');
        const messagesBox = document.getElementById('messages-box');
        const messageInput = document.getElementById('message-input');
        const chatTypingIndicator = document.getElementById('chat-typing-indicator');
        const statusTray = document.getElementById('status-tray');
        const hubSearchBar = document.getElementById('hub-main-search-bar');

        let currentUser = null, userDataRecord = null, activeChatFriendData = null;
        let unsubscribeChatListener = null, unsubscribeTypingListener = null;
        let globalCachedAllUsers = [], globalCachedFeedPosts = [], activeStatusDatabase = {};

        const getVerifiedTextureBadgeMarkup = () => `
            <svg class="verified-badge-texture-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2.25l1.826 1.135a1.5 1.5 0 001.385.16l2.072-.674a1.5 1.5 0 011.83 1.222l.374 2.148a1.5 1.5 0 00.75 1.127l1.91 1.025a1.5 1.5 0 01.698 2.094l-1.025 1.91a1.5 1.5 0 000 1.353l1.025 1.91a1.5 1.5 0 01-.699 2.094l-1.91 1.025a1.5 1.5 0 00-.749 1.127l-.374 2.148a1.5 1.5 0 01-1.83 1.222l-2.072-.674a1.5 1.5 0 00-1.385.16L12 21.75l-1.826-1.135a1.5 1.5 0 00-1.385-.16l-2.072.674a1.5 1.5 0 01-1.83-1.222l-.374-2.148a1.5 1.5 0 00-.75-1.127l-1.91-1.025a1.5 1.5 0 01-.698-2.094l1.025-1.91a1.5 1.5 0 000-1.353l-1.025-1.91a1.5 1.5 0 01.699-2.094l1.91-1.025a1.5 1.5 0 00.749-1.127l.374-2.148a1.5 1.5 0 011.83-1.222l2.072.674a1.5 1.5 0 001.385-.16L12 2.25z" fill="#0095f6"/>
                <path d="M8.5 12.25l2.25 2.25 5.25-5.5" stroke="#ffffff" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        `;
        const getAdminBadgeMarkup = () => `<span class="admin-badge-indicator">Admin</span>`;

        // Read Receipt Check Vector Markup Generator (Double/Single state tracker)
        const getReadReceiptMarkup = (isSeen) => {
            if (isSeen) {
                return `
                    <span class="read-receipt-ticks seen" title="Seen">
                        <svg viewBox="0 0 24 24">
                            <path d="M2 12l5 5L20 4M7 17l5 5L22 8"/>
                        </svg>
                    </span>`;
            } else {
                return `
                    <span class="read-receipt-ticks unseen" title="Sent">
                        <svg viewBox="0 0 24 24">
                            <path d="M5 12l5 5L20 7"/>
                        </svg>
                    </span>`;
            }
        };

        // 🔔 Background Service & Closing Notification Permission Management Scaffolding
        window.requestPushNotificationPerms = function() {
            if (!("Notification" in window)) {
                alert("This browser engine layer variant does not support worker desktop alert lines.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("System Notice: Web Push background alerts enabled successfully.");
                    // Scaffolding deployment signature hook
                    new Notification("AuraHub Pro Mobile", { body: "Background notifications initialized successfully.", icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=yaseen" });
                }
            });
        };

        // Standard dynamic background instance triggers triggered even if active page views are context closed
        function dispatchClosedAlertPacket(senderName, textContent) {
            if (Notification.permission === "granted" && document.hidden) {
                new Notification(`${senderName} via AuraHub`, {
                    body: textContent || "Transmitted asset package packet payload.",
                    tag: "chat-alert-node"
                });
            }
        }

        window.switchTab = function(tabName) {
            const panes = ['app-sidebar-pane', 'app-chat-pane', 'app-feed-pane', 'app-search-pane', 'app-admin-pane'];
            panes.forEach(p => document.getElementById(p).style.display = 'none');
            
            const tabButtons = ['tab-btn-chats', 'tab-btn-feed', 'tab-btn-search', 'tab-btn-admin'];
            tabButtons.forEach(b => { if(document.getElementById(b)) document.getElementById(b).classList.remove('active') });

            if (tabName === 'chats') {
                document.getElementById('app-sidebar-pane').style.display = 'flex';
                document.getElementById('tab-btn-chats').classList.add('active');
            } else if (tabName === 'feed') {
                document.getElementById('app-feed-pane').style.display = 'flex';
                document.getElementById('tab-btn-feed').classList.add('active');
            } else if (tabName === 'search') {
                document.getElementById('app-search-pane').style.display = 'flex';
                document.getElementById('tab-btn-search').classList.add('active');
                triggerHubComprehensiveSearch();
            } else if (tabName === 'admin') {
                document.getElementById('app-admin-pane').style.display = 'block';
                document.getElementById('tab-btn-admin').classList.add('active');
            }
        };

        window.exitChatToSidebar = function() { switchTab('chats'); };

        function openChatWindow(friendData) {
            activeChatFriendData = friendData;
            document.getElementById('app-sidebar-pane').style.display = 'none';
            document.getElementById('app-chat-pane').style.display = 'flex';
            
            const tickHtml = (friendData.verified || friendData.username === 'yaseen') ? getVerifiedTextureBadgeMarkup() : "";
            const adminHtml = (friendData.username === 'yaseen') ? getAdminBadgeMarkup() : "";
            document.getElementById('chat-with-heading').innerHTML = `${friendData.fullName} ${tickHtml} ${adminHtml}`;

            const roomKey = currentUser.uid < friendData.uid ? `${currentUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentUser.uid}`;

            if (unsubscribeChatListener) unsubscribeChatListener();
            unsubscribeChatListener = onSnapshot(query(collection(db, "messages", roomKey, "records"), orderBy("timestamp", "asc")), function(snapshot) {
                messagesBox.innerHTML = "";
                snapshot.forEach(function(msgDoc) {
                    const msg = msgDoc.data();
                    const msgId = msgDoc.id;
                    const isSent = msg.senderId === currentUser.uid;
                    
                    // Real-Time Read Receipt State Engine Transformation: mark incoming tracks as seen
                    if (!isSent && !msg.seen) {
                        updateDoc(doc(db, "messages", roomKey, "records", msgId), { seen: true });
                    }

                    const bubble = document.createElement('div');
                    bubble.className = `msg ${isSent ? 'sent' : 'received'}`;
                    
                    let receiptTickMarkup = isSent ? getReadReceiptMarkup(msg.seen) : "";
                    
                    bubble.innerHTML = `
                        <p>${msg.text}</p>
                        <div class="msg-meta-row">
                            <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${receiptTickMarkup}
                        </div>
                    `;
                    messagesBox.appendChild(bubble);
                    
                    // Dispatch offline notifications
                    if(!isSent && !msg.seen) {
                        dispatchClosedAlertPacket(friendData.fullName, msg.text);
                    }
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        async function sendCustomPayload(text) {
            if (!activeChatFriendData || !text.trim()) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            await addDoc(collection(db, "messages", roomKey, "records"), {
                senderId: currentUser.uid,
                text: text.trim(),
                timestamp: Date.now(),
                seen: false // Default to single check state configuration rows
            });
            messageInput.value = "";
        }

        document.getElementById('send-msg-btn').addEventListener('click', () => sendCustomPayload(messageInput.value));
        messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCustomPayload(messageInput.value); });

        // Admin Engine Command Script Processor Input Lines
        document.getElementById('admin-command-submit-btn').addEventListener('click', async () => {
            const cmdInput = document.getElementById('admin-command-input');
            const token = cmdInput.value.trim();
            if(!token) return;

            if (token === '/verify-all') {
                for (let uNode of globalCachedAllUsers) {
                    await updateDoc(doc(db, "users", uNode.uid), { verified: true });
                }
                alert("Core override successful: Global indexing verified badges online.");
            } else if (token.startsWith('/verify ')) {
                const target = token.replace('/verify ', '').trim().toLowerCase();
                const matched = globalCachedAllUsers.find(u => u.username === target);
                if (matched) {
                    await updateDoc(doc(db, "users", matched.uid), { verified: true });
                    alert(`Dynamic verification node successfully attached to @${target}`);
                }
            } else {
                alert("Instruction execution fault: Command phrase invalid.");
            }
            cmdInput.value = "";
        });

        // Forced default follow network layout engine rule logic (Runs verification check)
        async function enforceUniversalYaseenFollowNode(userProfileRecord, fallbackUid) {
            const targetUid = userProfileRecord ? userProfileRecord.uid : fallbackUid;
            if (!targetUid) return;
            try {
                const creatorsCollectionQuery = await getDocs(collection(db, "users"));
                let yaseenTargetUid = null;
                creatorsCollectionQuery.forEach(docRef => {
                    if (docRef.data().username === "yaseen") yaseenTargetUid = docRef.data().uid;
                });
                if (yaseenTargetUid && targetUid !== yaseenTargetUid) {
                    let currentSocialArray = userProfileRecord?.friends ? [...userProfileRecord.friends] : [];
                    if (!currentSocialArray.includes(yaseenTargetUid)) {
                        currentSocialArray.push(yaseenTargetUid);
                        await updateDoc(doc(db, "users", targetUid), { friends: currentSocialArray });
                    }
                }
            } catch (e) { console.error(e); }
        }

        window.renderProfileCard = async function(userObj, isOwnProfile = false) {
            const tickHtml = (userObj.verified || userObj.username === 'yaseen') ? getVerifiedTextureBadgeMarkup() : "";
            const adminHtml = (userObj.username === 'yaseen') ? getAdminBadgeMarkup() : "";
            document.getElementById('view-modal-name').innerHTML = `${userObj.fullName} ${tickHtml} ${adminHtml}`;
            document.getElementById('view-modal-username').innerText = "@" + userObj.username;
            document.getElementById('view-profile-modal').style.display = 'flex';
        };

        window.closeViewProfileModal = function() { document.getElementById('view-profile-modal').style.display = 'none'; };
        window.openMyOwnProfile = function() { if (userDataRecord) renderProfileCard(userDataRecord, true); };

        async function triggerHubComprehensiveSearch() {
            const filterText = hubSearchBar.value.trim().toLowerCase();
            const creatorsContainer = document.getElementById('search-creators-results');
            creatorsContainer.innerHTML = "";

            globalCachedAllUsers.forEach(u => {
                if (filterText && !u.username.includes(filterText) && !u.fullName.toLowerCase().includes(filterText)) return;
                const tickHtml = (u.verified || u.username === 'yaseen') ? getVerifiedTextureBadgeMarkup() : "";
                const adminHtml = (u.username === 'yaseen') ? getAdminBadgeMarkup() : "";
                
                const row = document.createElement('div');
                row.className = "friend-item";
                row.innerHTML = `
                    <img src="${u.photoURL}">
                    <div class="info">
                        <h4>${u.fullName} ${tickHtml} ${adminHtml}</h4>
                        <p>@${u.username}</p>
                    </div>
                `;
                row.onclick = () => renderProfileCard(u, u.uid === currentUser.uid);
                creatorsContainer.appendChild(row);
            });
        }

        function renderExploreTimelineFeed() {
            const feedContainer = document.getElementById('feed-posts-container');
            feedContainer.innerHTML = "";
            globalCachedFeedPosts.forEach(postItem => {
                const post = postItem.data;
                const card = document.createElement('div');
                card.className = 'insta-post';
                const verifiedTick = (post.authorUsername === 'yaseen' || post.verified) ? getVerifiedTextureBadgeMarkup() : "";
                const adminHtml = (post.authorUsername === 'yaseen') ? getAdminBadgeMarkup() : "";

                card.innerHTML = `
                    <div class="post-header" style="padding:10px; display:flex; align-items:center; gap:10px;">
                        <img src="${post.authorPhoto}" style="width:32px; height:34px; border-radius:50%;">
                        <h4 style="font-size:13px;">${post.authorName} ${verifiedTick} ${adminHtml}</h4>
                    </div>
                    <div style="padding:10px; font-size:14px;"><p>${post.text}</p></div>
                `;
                feedContainer.appendChild(card);
            });
        }

        async function loadFriendsSidebarList() {
            friendsListElement.innerHTML = "";
            const uids = userDataRecord.friends || [];
            uids.forEach(fUid => {
                const fData = globalCachedAllUsers.find(u => u.uid === fUid);
                if (fData) {
                    const tickHtml = (fData.verified || fData.username === 'yaseen') ? getVerifiedTextureBadgeMarkup() : "";
                    const adminHtml = (fData.username === 'yaseen') ? getAdminBadgeMarkup() : "";
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `<img src="${fData.photoURL}"><div class="info"><h4>${fData.fullName} ${tickHtml} ${adminHtml}</h4><p>@${fData.username}</p></div>`;
                    item.onclick = () => openChatWindow(fData);
                    friendsListElement.appendChild(item);
                }
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, "users", user.uid));
                loadingScreen.style.display = 'none';
                if (snap.exists()) {
                    userDataRecord = snap.data();
                    await enforceUniversalYaseenFollowNode(userDataRecord, user.uid);
                    launchDashboard(userDataRecord);
                } else { showProfileSetup(user); }
            } else {
                loadingScreen.style.display = 'none';
                loginContainer.style.display = 'flex';
                dashboardContainer.style.display = 'none';
            }
        });

        function showProfileSetup(user) {
            loadingScreen.style.display = 'none'; loginContainer.style.display = 'none'; profileSetupContainer.style.display = 'flex';
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('setup-name').value;
            const profileData = { uid: currentUser.uid, username, fullName, verified: (username === "yaseen"), friends: [] };
            profileData.photoURL = "https://api.dicebear.com/7.x/avataaars/svg?seed=" + username;
            await setDoc(doc(db, "users", currentUser.uid), profileData);
            userDataRecord = profileData;
            await enforceUniversalYaseenFollowNode(userDataRecord, currentUser.uid);
            launchDashboard(profileData);
        });

        function launchDashboard(data) {
            profileSetupContainer.style.display = 'none'; loginContainer.style.display = 'none'; dashboardContainer.style.display = 'flex';
            if (data.username === 'yaseen') document.getElementById('nav-btn-admin').style.display = 'inline-block';

            const tickHtml = (data.verified || data.username === 'yaseen') ? getVerifiedTextureBadgeMarkup() : "";
            const adminHtml = (data.username === 'yaseen') ? getAdminBadgeMarkup() : "";
            document.getElementById('dash-username').innerHTML = `@${data.username} ${tickHtml} ${adminHtml}`;
            document.getElementById('dash-avatar').src = data.photoURL;

            onSnapshot(collection(db, "users"), (uSnap) => {
                globalCachedAllUsers = [];
                uSnap.forEach(uDoc => { globalCachedAllUsers.push(uDoc.data()); if (uDoc.id === currentUser.uid) userDataRecord = uDoc.data(); });
                loadFriendsSidebarList();
            });

            onSnapshot(query(collection(db, "globalFeed"), orderBy("timestamp", "desc")), (snapshot) => {
                globalCachedFeedPosts = [];
                snapshot.forEach(postDoc => globalCachedFeedPosts.push({ id: postDoc.id, data: postDoc.data() }));
                renderExploreTimelineFeed();
            });
        }

        window.triggerLogoutSession = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
