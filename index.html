<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniqueChatHub - Workspace</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #11111b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f3f4f6;
        }

        .form-container {
            background: #1a1a26;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #2d2d44;
        }

        /* ---------------- DASHBOARD INTERFACE ---------------- */
        .dashboard-layout {
            max-width: 1100px;
            width: 100%;
            height: 85vh;
            background: #1a1a26;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d2d44;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            background: #13131f;
            border-right: 1px solid #2d2d44;
            display: flex;
            flex-direction: column;
        }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            background: #1a1a26;
            border-bottom: 1px solid #2d2d44;
        }

        .user-bar img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #a855f7;
            cursor: pointer;
        }

        .user-details {
            cursor: pointer;
            flex: 1;
        }

        .user-details h3 {
            font-size: 15px;
            color: #fff;
        }

        .user-details p {
            color: #a855f7;
            font-size: 12px;
            font-weight: 600;
        }

        .friend-system {
            padding: 15px;
            border-bottom: 1px solid #2d2d44;
        }

        .friend-input-group {
            display: flex;
            gap: 8px;
        }

        .friend-input-group input {
            flex: 1;
            padding: 10px;
            background: #1a1a26;
            border: 1px solid #3b3b54;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
        }

        .friend-btn {
            padding: 10px 14px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        .friends-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .friends-list-heading {
            font-size: 12px;
            text-transform: uppercase;
            color: #6b7280;
            font-weight: 700;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .friend-item:hover, .friend-item.active {
            background: #252538;
        }

        .friend-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .friend-item .info {
            flex: 1;
        }

        .friend-item .info h4 {
            font-size: 14px;
            color: #fff;
        }

        .friend-item .info p {
            font-size: 12px;
            color: #9ca3af;
        }

        .view-profile-btn {
            background: none;
            border: none;
            color: #a855f7;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Chat view window panel */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #161622;
        }

        .chat-header {
            padding: 20px;
            background: #1a1a26;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-size: 16px;
            color: #fff;
        }

        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg.sent {
            background: #a855f7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg.received {
            background: #2d2d44;
            color: #f3f4f6;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        .chat-input-area {
            padding: 20px;
            background: #1a1a26;
            border-top: 1px solid #2d2d44;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            padding: 14px;
            background: #13131f;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .chat-input-area input:focus {
            border-color: #a855f7;
            outline: none;
        }

        .attach-btn {
            background: #2d2d44;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .send-btn {
            padding: 14px 24px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ---------------- MODAL POPUPS (Profiles) ---------------- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #1a1a26;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #2d2d44;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            color: #6b7280;
            cursor: pointer;
        }

        /* Global generic structural designs */
        h2 { color: #fff; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #d1d5db; font-size: 14px; margin-bottom: 6px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #3b3b54; border-radius: 8px; font-size: 15px; background-color: #13131f; color: #fff; }
        .main-btn { width: 100%; padding: 12px; background: #a855f7; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .google-btn { width: 100%; padding: 12px; background: #13131f; color: #fff; border: 1px solid #3b3b54; border-radius: 8px; font-size: 15px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; }
        .google-btn img { width: 20px; height: 20px; }
        .profile-pic-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
        .avatar-preview-wrapper { width: 110px; height: 110px; border-radius: 50%; overflow: hidden; border: 3px solid #a855f7; margin-bottom: 12px; background: #13131f; }
        .avatar-preview-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .file-upload-btn { background: rgba(168, 85, 247, 0.2); color: #c084fc; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
        #loading-screen { color: white; font-size: 20px; font-weight: 600; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .no-chat-selected { flex: 1; display: flex; justify-content: center; align-items: center; color: #6b7280; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading-screen">Syncing workspace modules...</div>

    <div id="login-container" class="form-container" style="display: none;">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to enter UniqueChatHub</p>
        
        <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button id="email-login-btn" class="main-btn">Sign In</button>

        <div class="divider" style="margin:20px 0; color:#4b5563;">or</div>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <h2>Create Profile</h2>
        <p class="subtitle">Set up a unique database username</p>
        
        <form id="profile-form">
            <div class="profile-pic-group">
                <div class="avatar-preview-wrapper">
                    <img id="avatar-preview" src="https://via.placeholder.com/150" alt="Preview">
                </div>
                <label for="profile-pic-input" class="file-upload-btn">Choose Picture</label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>
            <div class="input-group">
                <label for="setup-username">Unique Username</label>
                <input type="text" id="setup-username" placeholder="username123" required>
            </div>
            <div class="input-group">
                <label for="setup-name">Full Name</label>
                <input type="text" id="setup-name" placeholder="Alex Carter" required>
            </div>
            <button type="submit" class="main-btn">Save & Enter Workspace</button>
        </form>
    </div>

    <div id="dashboard-container" class="dashboard-layout" style="display: none;">
        <div class="sidebar">
            <div class="user-bar">
                <img id="dash-avatar" src="" alt="Avatar" onclick="openEditProfileModal()">
                <div class="user-details" onclick="openEditProfileModal()">
                    <h3 id="dash-display-name">Loading...</h3>
                    <p id="dash-username"></p>
                </div>
                <button id="logout-btn" class="logout-btn">Exit</button>
            </div>

            <div class="friend-system">
                <div class="friend-input-group">
                    <input type="text" id="friend-username-input" placeholder="Enter friend's username...">
                    <button id="add-friend-btn" class="friend-btn">Add</button>
                </div>
            </div>

            <div class="friends-list-container">
                <div class="friends-list-heading">Direct Messages</div>
                <div id="friends-list"></div>
            </div>
        </div>

        <div class="chat-area">
            <div id="active-chat-window" style="display: none; flex-direction: column; flex: 1;">
                <div class="chat-header">
                    <h3 id="chat-with-heading">Chat Window</h3>
                    <button id="view-friend-profile-header-btn" class="view-profile-btn" style="font-size:14px;">View Profile</button>
                </div>
                <div id="messages-box" class="messages-box"></div>
                <div class="chat-input-area">
                    <label for="chat-image-input" class="attach-btn">📷</label>
                    <input type="file" id="chat-image-input" accept="image/*" style="display: none;">
                    
                    <input type="text" id="message-input" placeholder="Type a secure message...">
                    <button id="send-msg-btn" class="send-btn">Send</button>
                </div>
            </div>
            <div id="no-chat-fallback" class="no-chat-selected">
                <p>Select a friend from the sidebar column to start chatting</p>
            </div>
        </div>
    </div>

    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditProfileModal()">&times;</span>
            <h3>Edit Your Profile</h3>
            <br>
            <div class="profile-pic-group">
                <div class="avatar-preview-wrapper">
                    <img id="edit-avatar-preview" src="" alt="Avatar">
                </div>
                <label for="edit-profile-pic-input" class="file-upload-btn">Change Picture</label>
                <input type="file" id="edit-profile-pic-input" accept="image/*" style="display: none;">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="edit-fullname-input">
            </div>
            <button class="main-btn" onclick="saveEditedProfile()">Save Changes</button>
        </div>
    </div>

    <div id="view-profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeViewProfileModal()">&times;</span>
            <h3 id="view-modal-title">User Profile</h3>
            <br>
            <div class="avatar-preview-wrapper" style="margin: 0 auto 15px auto; width:120px; height:120px;">
                <img id="view-modal-avatar" src="" alt="User avatar">
            </div>
            <h2 id="view-modal-name" style="font-size:22px;">Name</h2>
            <p id="view-modal-username" style="color:#a855f7; font-weight:bold; margin-bottom:15px;">@username</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa",
            measurementId: "G-KFELX29065"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Containers
        const loadingScreen = document.getElementById('loading-screen');
        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        
        // Form & triggers
        const googleLoginBtn = document.getElementById('google-login-btn');
        const profilePicInput = document.getElementById('profile-pic-input');
        const avatarPreview = document.getElementById('avatar-preview');
        const profileForm = document.getElementById('profile-form');
        const logoutBtn = document.getElementById('logout-btn');
        
        const addFriendBtn = document.getElementById('add-friend-btn');
        const friendsListElement = document.getElementById('friends-list');
        const sendMsgBtn = document.getElementById('send-msg-btn');
        const messageInput = document.getElementById('message-input');
        const messagesBox = document.getElementById('messages-box');
        const chatImageInput = document.getElementById('chat-image-input');

        let currentUser = null;
        let userDataRecord = null;
        let base64Image = "https://via.placeholder.com/150";
        let activeChatFriendData = null;
        let unsubscribeChatListener = null;

        // Modals management mapping out to global windows scope
        window.openEditProfileModal = function() {
            document.getElementById('edit-avatar-preview').src = userDataRecord.photoURL;
            document.getElementById('edit-fullname-input').value = userDataRecord.fullName;
            document.getElementById('edit-profile-modal').style.display = 'flex';
        }
        window.closeEditProfileModal = function() { document.getElementById('edit-profile-modal').style.display = 'none'; }
        
        window.closeViewProfileModal = function() { document.getElementById('view-profile-modal').style.display = 'none'; }

        document.getElementById('edit-profile-pic-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const r = new FileReader();
                r.onload = function(ev) {
                    document.getElementById('edit-avatar-preview').src = ev.target.result;
                };
                r.readAsDataURL(file);
            }
        });

        window.saveEditedProfile = async function() {
            const newName = document.getElementById('edit-fullname-input').value.trim();
            const newImg = document.getElementById('edit-avatar-preview').src;
            if(!newName) return;

            try {
                const ref = doc(db, "users", currentUser.uid);
                await updateDoc(ref, { fullName: newName, photoURL: newImg });
                userDataRecord.fullName = newName;
                userDataRecord.photoURL = newImg;
                
                document.getElementById('dash-avatar').src = newImg;
                document.getElementById('dash-display-name').innerText = newName;
                closeEditProfileModal();
                alert("Profile updated!");
            } catch(e) { alert(e.message); }
        }

        document.getElementById('view-friend-profile-header-btn').addEventListener('click', () => {
            if(!activeChatFriendData) return;
            document.getElementById('view-modal-title').innerText = "Friend Info";
            document.getElementById('view-modal-avatar').src = activeChatFriendData.photoURL;
            document.getElementById('view-modal-name').innerText = activeChatFriendData.fullName;
            document.getElementById('view-modal-username').innerText = "@" + activeChatFriendData.username;
            document.getElementById('view-profile-modal').style.display = 'flex';
        });

        // Track Login Sessions
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDocSnap = await getDoc(userDocRef);
                    loadingScreen.style.display = 'none';
                    if (userDocSnap.exists()) {
                        userDataRecord = userDocSnap.data();
                        launchDashboard(userDataRecord);
                    } else {
                        showProfileSetup(user);
                    }
                } catch(e) {
                    loadingScreen.style.display = 'none';
                    showProfileSetup(user);
                }
            } else {
                loadingScreen.style.display = 'none';
                loginContainer.style.display = 'block';
                profileSetupContainer.style.display = 'none';
                dashboardContainer.style.display = 'none';
            }
        });

        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => alert(err.message));
        });

        function showProfileSetup(user) {
            loginContainer.style.display = 'none';
            profileSetupContainer.style.display = 'block';
            dashboardContainer.style.display = 'none';
            if (user.displayName) document.getElementById('setup-name').value = user.displayName;
            if (user.photoURL) { avatarPreview.src = user.photoURL; base64Image = user.photoURL; }
        }

        profilePicInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarPreview.src = event.target.result;
                    base64Image = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const rawUsername = document.getElementById('setup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('setup-name').value;

            if(rawUsername.length < 3) { alert("Username must be 3+ characters."); return; }

            try {
                const usernameQuery = query(collection(db, "users"), where("username", "==", rawUsername));
                const querySnapshot = await getDocs(usernameQuery);
                if (!querySnapshot.empty) { alert("Username taken!"); return; }

                const profileData = {
                    uid: currentUser.uid,
                    username: rawUsername,
                    fullName: fullName,
                    photoURL: base64Image,
                    friends: []
                };

                await setDoc(doc(db, "users", currentUser.uid), profileData);
                userDataRecord = profileData;
                launchDashboard(profileData);
            } catch(error) { alert(error.message); }
        });

        function launchDashboard(data) {
            profileSetupContainer.style.display = 'none';
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'flex';
            
            document.getElementById('dash-avatar').src = data.photoURL;
            document.getElementById('dash-display-name').innerText = data.fullName;
            document.getElementById('dash-username').innerText = "@" + data.username;
            
            loadFriendsSidebarList();
        }

        // Add Friend Logic
        addFriendBtn.addEventListener('click', async () => {
            const target = document.getElementById('friend-username-input').value.trim().toLowerCase();
            if(!target || target === userDataRecord.username) return;

            try {
                const q = query(collection(db, "users"), where("username", "==", target));
                const snap = await getDocs(q);
                if(snap.empty) { alert("User not found!"); return; }

                const friendDoc = snap.docs[0].data();
                const friendUid = friendDoc.uid;

                let fList = userDataRecord.friends || [];
                if(fList.includes(friendUid)) { alert("Already added!"); return; }

                fList.push(friendUid);
                await updateDoc(doc(db, "users", currentUser.uid), { friends: fList });
                userDataRecord.friends = fList;

                let tfList = friendDoc.friends || [];
                if(!tfList.includes(currentUser.uid)) {
                    tfList.push(currentUser.uid);
                    await updateDoc(doc(db, "users", friendUid), { friends: tfList });
                }

                document.getElementById('friend-username-input').value = "";
                loadFriendsSidebarList();
            } catch(err) { alert(err.message); }
        });

        async function loadFriendsSidebarList() {
            friendsListElement.innerHTML = "";
            const currentFriendsUids = userDataRecord.friends || [];

            for(let fUid of currentFriendsUids) {
                const fDocSnap = await getDoc(doc(db, "users", fUid));
                if(fDocSnap.exists()) {
                    const friendData = fDocSnap.data();
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `
                        <img src="${friendData.photoURL}">
                        <div class="info">
                            <h4>${friendData.fullName}</h4>
                            <p>@${friendData.username}</p>
                        </div>
                    `;
                    item.addEventListener('click', () => openChatWindow(friendData));
                    friendsListElement.appendChild(item);
                }
            }
        }

        // Open chat window and parse content records
        function openChatWindow(friendData) {
            activeChatFriendData = friendData;
            document.getElementById('no-chat-fallback').style.display = 'none';
            document.getElementById('active-chat-window').style.display = 'flex';
            document.getElementById('chat-with-heading').innerText = `${friendData.fullName} (@${friendData.username})`;

            const roomKey = currentUser.uid < friendData.uid ? 
                `${currentUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentUser.uid}`;

            if(unsubscribeChatListener) unsubscribeChatListener();

            const chatQuery = query(collection(db, "messages", roomKey, "records"), orderBy("timestamp", "asc"));
            unsubscribeChatListener = onSnapshot(chatQuery, (snapshot) => {
                messagesBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const bubble = document.createElement('div');
                    bubble.className = `msg ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    
                    if(msg.type === "image") {
                        bubble.innerHTML = `${msg.text ? `<p>${msg.text}</p>` : ''}<img src="${msg.mediaData}">`;
                    } else {
                        bubble.innerText = msg.text;
                    }
                    messagesBox.appendChild(bubble);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        sendMsgBtn.addEventListener('click', () => sendMsgPayload("text", null));
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsgPayload("text", null); });

        // Local inline Image FileReader share processing trigger
        chatImageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                if(file.size > 800000) { alert("Image size too large for free tier database string capacity!"); return; }
                const reader = new FileReader();
                reader.onload = function(evt) {
                    sendMsgPayload("image", evt.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        async function sendMsgPayload(type, mediaData) {
            const txt = messageInput.value.trim();
            if(!txt && !mediaData) return;
            if(!activeChatFriendData) return;

            const roomKey = currentUser.uid < activeChatFriendData.uid ? 
                `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;

            const payload = {
                senderId: currentUser.uid,
                text: txt,
                type: type,
                mediaData: mediaData || "",
                timestamp: new Date().getTime()
            };

            messageInput.value = "";
            chatImageInput.value = "";
            await addDoc(collection(db, "messages", roomKey, "records"), payload);
        }

        logoutBtn.addEventListener('click', () => { if(unsubscribeChatListener) unsubscribeChatListener(); signOut(auth); });
    </script>
</body>
</html>
