<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraHub</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-secondary: #f1f5f9;
            --border-color: #e2e8f0;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --accent-glow: #0284c7;
            --accent-purple: #6366f1;
            --accent-rose: #e11d48;
            --story-gradient: linear-gradient(135deg, #c084fc 0%, #6366f1 50%, #38bdf8 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        #loading-screen { color: var(--text-muted); font-size: 16px; font-weight: 500; letter-spacing: 1px; }

        .form-container {
            background: var(--bg-card);
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .app-logo-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            background: var(--story-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-layout {
            width: 100%;
            max-width: 1040px;
            height: 90vh;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }

        .app-navbar {
            height: 68px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: var(--bg-card);
        }

        .nav-brand { font-weight: 900; font-size: 24px; cursor: pointer; letter-spacing: -1px; color: var(--text-color); }
        .nav-links { display: flex; gap: 28px; align-items: center; }
        .nav-item { cursor: pointer; font-weight: 600; font-size: 14px; background: none; border: none; color: var(--text-muted); transition: color 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--accent-glow); }

        .main-content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 360px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .user-bar img { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); cursor: pointer; }
        .user-details { flex: 1; min-width: 0; cursor: pointer; }
        .user-details h3 { font-size: 14px; font-weight: 700; color: var(--text-color); }
        .user-details p { color: var(--text-muted); font-size: 12px; }

        .story-tray {
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-main);
        }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 70px; cursor: pointer; }
        .story-avatar-wrap {
            width: 60px; height: 60px; border-radius: 50%; padding: 2.5px;
            background: var(--story-gradient); display: flex; justify-content: center; align-items: center;
        }
        .story-avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: var(--bg-card); padding: 2px; }
        .story-item span { font-size: 11px; margin-top: 6px; max-width: 66px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; color: var(--text-muted); }

        .friend-system { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .friend-input-group { display: flex; gap: 8px; background: var(--bg-secondary); padding: 8px 16px; border-radius: 14px; border: 1px solid var(--border-color); }
        .friend-input-group input { flex: 1; padding: 2px 0; background: transparent; border: none; color: var(--text-color); font-size: 14px; outline: none; }
        .friend-input-group input::placeholder { color: var(--text-muted); }

        .friends-list-container { flex: 1; overflow-y: auto; }
        .friends-list-heading { font-size: 11px; font-weight: 800; color: var(--text-muted); padding: 20px 20px 8px 20px; letter-spacing: 1px; text-transform: uppercase; }
        .friend-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; border-radius: 14px; margin: 0 8px 4px 8px; transition: background 0.2s; }
        .friend-item:hover { background: var(--bg-secondary); }
        .friend-item img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .friend-item .info h4 { font-size: 14px; font-weight: 600; color: var(--text-color); }
        .friend-item .info p { font-size: 12px; color: var(--text-muted); }

        .chat-area, .feed-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); min-width: 0; }
        .feed-area { display: none; overflow-y: auto; padding: 28px; }
        
        .chat-header { height: 68px; padding: 0 28px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-card); }
        .chat-header h3 { font-size: 16px; font-weight: 700; color: var(--text-color); }
        .typing-indicator-span { font-size: 12px; color: var(--accent-glow); margin-left: 6px; display: none; }
        .back-arrow { display: none; background: none; border: none; font-size: 18px; color: var(--text-color); cursor: pointer; }

        .messages-box { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 65%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
        .msg.sent { background: var(--accent-purple); color: #fff; align-self: flex-end; box-shadow: 0 4px 12px rgba(99,102,241,0.2); }
        .msg.received { background: var(--bg-card); color: var(--text-color); align-self: flex-start; border: 1px solid var(--border-color); }
        .msg img, .msg video { max-width: 100%; border-radius: 12px; margin-top: 6px; display: block; max-height: 220px; object-fit: cover; }
        .msg audio { display: block; margin-top: 6px; max-width: 100%; }
        .msg-meta-row { display: flex; align-items: center; gap: 4px; margin-top: 6px; font-size: 10px; opacity: 0.6; }

        .chat-input-wrapper { padding: 20px; background: var(--bg-card); border-top: 1px solid var(--border-color); }
        .chat-input-container {
            background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 18px; padding: 10px 18px; display: flex; gap: 14px; align-items: center;
        }
        .chat-input-container input[type="text"] { flex: 1; padding: 4px 0; background: transparent; border: none; color: var(--text-color); font-size: 14px; outline: none; }
        .action-icon-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: color 0.2s; }
        .action-icon-btn:hover { color: var(--text-color); }
        .action-icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
        .action-icon-btn.recording { color: var(--accent-rose); animation: pulseRecord 1.5s infinite; }
        .send-txt-btn { background: none; border: none; color: var(--accent-glow); font-weight: 700; font-size: 14px; cursor: pointer; }

        .feed-composer {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; margin-bottom: 28px; max-width: 580px; width: 100%; margin-left: auto; margin-right: auto;
        }
        .feed-composer textarea { width: 100%; height: 75px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; color: var(--text-color); outline: none; resize: none; font-size: 14px; margin-bottom: 14px; }
        .feed-composer-actions { display: flex; justify-content: space-between; align-items: center; }
        .feed-posts-container { display: flex; flex-direction: column; gap: 28px; max-width: 580px; width: 100%; margin-left: auto; margin-right: auto; }
        
        .insta-post { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border-color); }
        .post-author-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .post-header img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .post-header h4 { font-size: 14px; font-weight: 700; color: var(--text-color); }
        .post-media { width: 100%; max-height: 480px; object-fit: cover; }
        .post-body { padding: 18px 20px; font-size: 14px; line-height: 1.6; }
        .post-body .author-name { font-weight: 700; margin-right: 8px; color: var(--accent-glow); }
        
        .post-actions-toolbar { display: flex; gap: 20px; padding: 0 4px 12px 4px; border-bottom: 1px solid var(--border-color); }
        .post-action-item { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-color); font-size: 13px; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .post-action-item:hover { color: var(--accent-glow); }
        .post-action-item.liked { color: var(--accent-rose); }
        .post-action-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
        .post-action-item.liked svg { fill: currentColor; }

        .post-comments-section { padding-top: 14px; display: flex; flex-direction: column; gap: 8px; max-height: 160px; overflow-y: auto; }
        .comment-row { font-size: 13px; line-height: 1.4; color: var(--text-color); }
        .comment-user { font-weight: 700; margin-right: 6px; color: var(--accent-purple); }
        .comment-input-row { display: flex; gap: 8px; margin-top: 14px; background: var(--bg-secondary); padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border-color); }
        .comment-input-row input { flex: 1; background: transparent; border: none; color: var(--text-color); font-size: 13px; outline: none; }
        .friend-btn { background: none; border: none; color: var(--accent-glow); font-weight: 700; cursor: pointer; font-size: 14px; }

        .aesthetic-follow-btn { background: rgba(2,132,199,0.08); border: 1px solid var(--accent-glow); color: var(--accent-glow); padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .aesthetic-follow-btn:hover { background: var(--accent-glow); color: #fff; }
        .aesthetic-follow-btn.unfollow-btn { border-color: var(--accent-rose); color: var(--accent-rose); background: rgba(225,29,72,0.05); }
        .aesthetic-follow-btn.unfollow-btn:hover { background: var(--accent-rose); color: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.4); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--bg-card); padding: 32px; border-radius: 28px; border: 1px solid var(--border-color); width: 100%; max-width: 440px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .close-modal { position: absolute; top: 16px; right: 20px; font-size: 24px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .close-modal:hover { color: var(--text-color); }
        
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; color: var(--text-muted); }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 14px; background: var(--bg-secondary); color: var(--text-color); outline: none; }
        .input-group textarea { height: 60px; resize: none; }
        
        .main-btn { width: 100%; padding: 14px; background: var(--accent-glow); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        .main-btn:hover { opacity: 0.9; }
        .secondary-btn { width: 100%; padding: 14px; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 12px; font-size: 14px; cursor: pointer; margin-top: 8px; font-weight: 600; }
        .no-chat-selected { flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 14px; }
        
        #status-viewer-modal .modal-content { max-width: 480px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 24px; }
        #status-media-container { width: 100%; min-height: 480px; display: flex; justify-content: center; align-items: center; border-radius: 16px; overflow: hidden; background: #f1f5f9; }
        #status-viewer-img, #status-viewer-video { width: 100%; max-height: 70vh; object-fit: contain; }

        .profile-modal-hdr { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .profile-stat-row { display: flex; gap: 28px; margin: 12px 0; }
        .profile-stat-box h5 { font-size: 20px; font-weight: 700; color: var(--text-color); }
        .profile-stat-box p { font-size: 12px; color: var(--text-muted); }
        .profile-description-txt { font-size: 14px; color: var(--text-color); margin-top: 6px; line-height: 1.4; font-style: italic; background: var(--bg-secondary); padding: 10px 14px; border-radius: 12px; width: 100%; border: 1px solid var(--border-color); }
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 240px; overflow-y: auto; width: 100%; margin-top: 12px; }
        .profile-grid-item { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }

        @media (max-width: 768px) {
            .dashboard-layout { height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100%; }
            .chat-area { display: none; }
            .dashboard-layout.chat-active .sidebar { display: none; }
            .dashboard-layout.chat-active .chat-area { display: flex; }
            .back-arrow { display: block; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">Syncing data structures...</div>

    <div id="login-container" class="form-container" style="display: none;">
        <div class="app-logo-title">AuraHub</div>
        <div class="input-group">
            <input type="email" id="login-email" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="Password">
        </div>
        <button id="email-primary-btn" class="main-btn">Sign In</button>
        <button id="auth-toggle-mode-btn" class="secondary-btn">Create New Account</button>
        <div style="margin:16px 0; color:var(--text-muted); font-size:13px;">OR</div>
        <button id="google-login-btn" class="secondary-btn" style="color: var(--accent-glow);">Log in with Google</button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <div class="app-logo-title">Profile Setup</div>
        <form id="profile-form">
            <div class="input-group">
                <input type="text" id="setup-username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="text" id="setup-name" placeholder="Full Name" required>
            </div>
            <button type="submit" class="main-btn">Complete Setup</button>
        </form>
    </div>

    <div id="dashboard-container" class="dashboard-layout" style="display: none;">
        <div class="app-navbar">
            <div class="nav-brand" onclick="switchTab('chats')">AuraHub</div>
            <div class="nav-links">
                <button id="nav-btn-chats" class="nav-item active" onclick="switchTab('chats')">Messages</button>
                <button id="nav-btn-feed" class="nav-item" onclick="switchTab('feed')">Explore Feed</button>
                <button onclick="triggerLogoutSession()" class="nav-item" style="color: var(--accent-rose);">Logout</button>
            </div>
        </div>

        <div class="main-content-area">
            <div class="sidebar" id="app-sidebar-pane">
                <div class="user-bar">
                    <img id="dash-avatar" src="" onclick="openMyOwnProfile()">
                    <div class="user-details" onclick="openMyOwnProfile()">
                        <h3 id="dash-username">@username</h3>
                        <p id="dash-display-name">Loading...</p>
                    </div>
                    <label for="status-file-input" class="action-icon-btn" title="Add to My Story" style="color: var(--accent-glow);">
                        <svg viewBox="0 0 24 24" style="width:26px; height:26px;"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </label>
                    <input type="file" id="status-file-input" accept="image/*,video/*" style="display:none;">
                </div>

                <div id="status-tray" class="story-tray"></div>

                <div class="friend-system">
                    <div class="friend-input-group">
                        <input type="text" id="global-search-input" placeholder="Search creators or post text...">
                    </div>
                </div>
                
                <div class="friends-list-container">
                    <div class="friends-list-heading">Direct Messages</div>
                    <div id="friends-list"></div>
                </div>
            </div>

            <div class="chat-area" id="app-chat-pane">
                <div id="active-chat-window" style="display: none; flex-direction: column; flex: 1; height: 100%;">
                    <div class="chat-header">
                        <button class="back-arrow" onclick="exitChatToSidebar()">Back</button>
                        <div class="chat-header-meta">
                            <h3 id="chat-with-heading">Chat User</h3>
                            <span id="chat-typing-indicator" class="typing-indicator-span">typing...</span>
                        </div>
                        <button id="view-friend-profile-header-btn" class="friend-btn" style="margin-left: auto;">View Profile</button>
                    </div>
                    
                    <div id="messages-box" class="messages-box"></div>
                    
                    <div class="chat-input-wrapper">
                        <div class="chat-input-container">
                            <label for="chat-image-input" class="action-icon-btn">
                                <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                            </label>
                            <input type="file" id="chat-image-input" accept="image/*,video/*" style="display: none;">
                            
                            <button id="voice-record-btn" class="action-icon-btn">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 1c-1.66 0-3 1.34-3 3v8c0 1.66 1.34 3 3 3s3-1.34 3-3V4c0-1.66-1.34-3-3-3z"/>
                                    <path d="M19 10v1c0 3.53-2.61 6.44-6 6.93V21h-2v-3.07c-3.39-.49-6-3.4-6-6.93v-1h2v1c0 2.76 2.24 5 5 5s5-2.24 5-5v-1h2z"/>
                                </svg>
                            </button>

                            <input type="text" id="message-input" placeholder="Message...">
                            <button id="send-msg-btn" class="send-txt-btn">Send</button>
                        </div>
                    </div>
                </div>
                <div id="no-chat-fallback" class="no-chat-selected">
                    <p>Select a user conversation to begin</p>
                </div>
            </div>

            <div class="feed-area" id="app-feed-pane">
                <div class="feed-composer">
                    <textarea id="feed-post-text" placeholder="Share something cool with the world..."></textarea>
                    <div class="feed-composer-actions">
                        <input type="file" id="feed-post-file" accept="image/*,video/*" style="display: none;">
                        <button class="secondary-btn" style="width: auto; margin: 0; padding: 8px 14px;" onclick="document.getElementById('feed-post-file').click()">Add Media</button>
                        <button class="main-btn" style="width: auto; padding: 8px 16px;" id="submit-feed-post-btn">Publish</button>
                    </div>
                    <div id="feed-file-preview-label" style="font-size: 12px; color: var(--accent-glow); margin-top: 6px; display: none;">Media attachment queued</div>
                </div>
                <div id="feed-posts-container" class="feed-posts-container"></div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeSettingsModal()">&times;</span>
            <h2>Profile Settings</h2>
            <br>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="settings-fullname-input">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="settings-username-input">
            </div>
            <div class="input-group">
                <label>Description / Bio</label>
                <textarea id="settings-description-input" placeholder="Tell us about yourself..."></textarea>
            </div>
            <button class="main-btn" onclick="saveSettingsChanges()">Save Changes</button>
        </div>
    </div>

    <div id="view-profile-modal" class="modal">
        <div class="modal-content" style="max-width: 460px;">
            <span class="close-modal" onclick="closeViewProfileModal()">&times;</span>
            <div class="profile-modal-hdr">
                <div style="width:80px; height:80px; border-radius:50%; overflow:hidden; margin-bottom: 10px; border: 2px solid var(--accent-glow);">
                    <img id="view-modal-avatar" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <h2 id="view-modal-name">Name</h2>
                <p id="view-modal-username" style="color:var(--accent-glow); font-weight:700;">@username</p>
                
                <div class="profile-stat-row">
                    <div class="profile-stat-box">
                        <h5 id="profile-stat-followers">0</h5>
                        <p>Followers</p>
                    </div>
                    <div class="profile-stat-box">
                        <h5 id="profile-stat-posts">0</h5>
                        <p>Posts</p>
                    </div>
                </div>
                <div id="view-modal-description" class="profile-description-txt">No description added yet.</div>
                <button id="profile-action-edit-btn" class="secondary-btn" style="display:none; padding:6px; font-size:12px; margin-top:12px;" onclick="switchFromProfileToSettings()">Edit Description</button>
            </div>
            
            <h4 style="text-align: left; font-size: 13px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">Recent Posts</h4>
            <div id="profile-posts-grid" class="profile-posts-grid"></div>
        </div>
    </div>

    <div id="status-viewer-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStatusViewer()">&times;</span>
            <h3 id="status-author-name" style="text-align: left; margin-bottom: 12px;">Story</h3>
            <div id="status-media-container">
                <img id="status-viewer-img" style="display:none;">
                <video id="status-viewer-video" controls autoplay style="display:none;"></video>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loadingScreen = document.getElementById('loading-screen');
        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const friendsListElement = document.getElementById('friends-list');
        const messagesBox = document.getElementById('messages-box');
        const messageInput = document.getElementById('message-input');
        const chatTypingIndicator = document.getElementById('chat-typing-indicator');
        const statusTray = document.getElementById('status-tray');
        const statusFileInput = document.getElementById('status-file-input');
        const chatImageInput = document.getElementById('chat-image-input');
        const voiceRecordBtn = document.getElementById('voice-record-btn');
        const primaryAuthBtn = document.getElementById('email-primary-btn');
        const toggleAuthModeBtn = document.getElementById('auth-toggle-mode-btn');
        const searchInput = document.getElementById('global-search-input');

        let currentUser = null;
        let userDataRecord = null;
        let activeChatFriendData = null;
        let unsubscribeChatListener = null;
        let unsubscribeTypingListener = null;
        let activeStatusDatabase = {}; 
        let mediaRecorder = null;
        let audioChunks = [];
        let isSignUpMode = false;
        let selectedFeedFileBase64 = "";
        let globalCachedFeedPosts = [];

        window.switchTab = function(tabName) {
            const chatPane = document.getElementById('app-chat-pane');
            const feedPane = document.getElementById('app-feed-pane');
            const sidePane = document.getElementById('app-sidebar-pane');
            const btnChats = document.getElementById('nav-btn-chats');
            const btnFeed = document.getElementById('nav-btn-feed');

            btnChats.classList.remove('active');
            btnFeed.classList.remove('active');

            if(tabName === 'feed') {
                chatPane.style.display = 'none';
                sidePane.style.display = 'none';
                feedPane.style.display = 'flex';
                btnFeed.classList.add('active');
            } else {
                feedPane.style.display = 'none';
                sidePane.style.display = 'flex';
                chatPane.style.display = 'flex';
                btnChats.classList.add('active');
            }
        };

        window.openSettingsModal = function() {
            document.getElementById('settings-fullname-input').value = userDataRecord.fullName;
            document.getElementById('settings-username-input').value = userDataRecord.username;
            document.getElementById('settings-description-input').value = userDataRecord.description || "";
            document.getElementById('settings-modal').style.display = 'flex';
        };
        window.closeSettingsModal = function() { document.getElementById('settings-modal').style.display = 'none'; };
        window.closeViewProfileModal = function() { document.getElementById('view-profile-modal').style.display = 'none'; };

        window.switchFromProfileToSettings = function() {
            closeViewProfileModal();
            openSettingsModal();
        };

        window.saveSettingsChanges = async function() {
            const updatedName = document.getElementById('settings-fullname-input').value.trim();
            const updatedUsername = document.getElementById('settings-username-input').value.trim().toLowerCase();
            const updatedDesc = document.getElementById('settings-description-input').value.trim();
            if(!updatedName || !updatedUsername) return;
            try {
                const completePayload = { fullName: updatedName, username: updatedUsername, description: updatedDesc };
                await updateDoc(doc(db, "users", currentUser.uid), completePayload);
                userDataRecord = { ...userDataRecord, ...completePayload };
                launchDashboard(userDataRecord);
                closeSettingsModal();
            } catch(e) { alert(e.message); }
        };

        window.renderProfileCard = async function(userObj, isOwnProfile = false) {
            document.getElementById('view-modal-avatar').src = userObj.photoURL;
            document.getElementById('view-modal-name').innerText = userObj.fullName;
            document.getElementById('view-modal-username').innerText = "@" + userObj.username;
            document.getElementById('view-modal-description').innerText = userObj.description || "No bio description configured yet.";
            
            document.getElementById('profile-action-edit-btn').style.display = isOwnProfile ? 'block' : 'none';

            try {
                const followerQuery = await getDocs(query(collection(db, "users"), where("friends", "array-contains", userObj.uid)));
                document.getElementById('profile-stat-followers').innerText = followerQuery.size;
            } catch(fErr) { document.getElementById('profile-stat-followers').innerText = "0"; }

            const gridContainer = document.getElementById('profile-posts-grid');
            gridContainer.innerHTML = "";
            try {
                const postsQuery = await getDocs(query(collection(db, "globalFeed"), where("authorUid", "==", userObj.uid)));
                document.getElementById('profile-stat-posts').innerText = postsQuery.size;
                
                postsQuery.forEach(pDoc => {
                    const data = pDoc.data();
                    if(data.mediaUrl) {
                        let element = document.createElement(data.mediaType === 'video' ? 'video' : 'img');
                        element.src = data.mediaUrl;
                        element.className = 'profile-grid-item';
                        gridContainer.appendChild(element);
                    }
                });
                if(gridContainer.children.length === 0) {
                    gridContainer.innerHTML = `<p style="grid-column: span 3; color: var(--text-muted); font-size: 12px; margin-top:12px;">No uploaded media items.</p>`;
                }
            } catch(pErr) {
                document.getElementById('profile-stat-posts').innerText = "0";
            }

            document.getElementById('view-profile-modal').style.display = 'flex';
        };

        window.openMyOwnProfile = function() {
            if(userDataRecord) renderProfileCard(userDataRecord, true);
        };

        document.getElementById('view-friend-profile-header-btn').addEventListener('click', () => {
            if(activeChatFriendData) renderProfileCard(activeChatFriendData, false);
        });

        // Toggle connection architecture logic supporting Follow/Unfollow paradigms
        window.toggleFollowState = async function(targetUid, targetUsername) {
            let currentFriendsList = userDataRecord.friends || [];
            if (currentFriendsList.includes(targetUid)) {
                currentFriendsList = currentFriendsList.filter(uid => uid !== targetUid);
                alert("You unfollowed @" + targetUsername);
            } else {
                currentFriendsList.push(targetUid);
                alert("You followed @" + targetUsername);
            }
            await updateDoc(doc(db, "users", currentUser.uid), { friends: currentFriendsList });
            userDataRecord.friends = currentFriendsList;
            loadFriendsSidebarList();
            processFilterSearchRender();
        };

        window.togglePostLike = async function(postId, currentLikes = []) {
            const postRef = doc(db, "globalFeed", postId);
            let updatedLikes = [...currentLikes];
            if(updatedLikes.includes(currentUser.uid)) {
                updatedLikes = updatedLikes.filter(id => id !== currentUser.uid);
            } else {
                updatedLikes.push(currentUser.uid);
            }
            await updateDoc(postRef, { likes: updatedLikes });
        };

        window.submitPostComment = async function(postId, commentInputId) {
            const inputEl = document.getElementById(commentInputId);
            const text = inputEl.value.trim();
            if(!text) return;

            const postRef = doc(db, "globalFeed", postId);
            const postSnap = await getDoc(postRef);
            let commentsList = postSnap.exists() && postSnap.data().comments ? postSnap.data().comments : [];
            
            commentsList.push({
                username: userDataRecord.username,
                text: text,
                timestamp: Date.now()
            });

            await updateDoc(postRef, { comments: commentsList });
            inputEl.value = "";
        };

        window.sharePostLink = function(postId) {
            const dummyLink = window.location.href.split('?')[0] + "?post=" + postId;
            navigator.clipboard.writeText(dummyLink).then(() => {
                alert("Link copied to clipboard!");
            });
        };

        // Real-Time Search Logic Filter
        searchInput.addEventListener('input', () => {
            loadFriendsSidebarList();
            processFilterSearchRender();
        });

        function processFilterSearchRender() {
            const filterText = searchInput.value.trim().toLowerCase();
            const feedContainer = document.getElementById('feed-posts-container');
            feedContainer.innerHTML = "";

            globalCachedFeedPosts.forEach(postItem => {
                const post = postItem.data;
                const postId = postItem.id;

                // Match both creator username context and content text values
                const matchUser = post.authorUsername.toLowerCase().includes(filterText);
                const matchText = post.text.toLowerCase().includes(filterText);
                if(filterText && !matchUser && !matchText) return;

                const card = document.createElement('div');
                card.className = 'insta-post';
                
                let mediaBlock = "";
                if(post.mediaUrl) {
                    mediaBlock = post.mediaType === 'video' 
                        ? `<video class="post-media" src="${post.mediaUrl}" controls></video>`
                        : `<img class="post-media" src="${post.mediaUrl}">`;
                }

                const likesArray = post.likes || [];
                const commentsArray = post.comments || [];
                const isLiked = likesArray.includes(currentUser.uid);
                const isFriend = (userDataRecord.friends || []).includes(post.authorUid);
                
                let followActionHtml = "";
                if (post.authorUid !== currentUser.uid) {
                    followActionHtml = isFriend 
                        ? `<button class="aesthetic-follow-btn unfollow-btn" onclick="toggleFollowState('${post.authorUid}', '${post.authorUsername}')">✕ Disconnect</button>` 
                        : `<button class="aesthetic-follow-btn" onclick="toggleFollowState('${post.authorUid}', '${post.authorUsername}')">⚡ Connect</button>`;
                }

                let commentsHtml = commentsArray.map(c => `
                    <div class="comment-row"><span class="comment-user">@${c.username}</span>${c.text}</div>
                `).join('');

                card.innerHTML = `
                    <div class="post-header">
                        <div class="post-author-info" id="post-author-hdr-${postId}">
                            <img src="${post.authorPhoto}">
                            <h4>${post.authorName} (@${post.authorUsername})</h4>
                        </div>
                        ${followActionHtml}
                    </div>
                    ${mediaBlock}
                    <div class="post-body">
                        <p><span class="author-name">${post.authorUsername}</span>${post.text}</p>
                        
                        <div class="post-actions-toolbar" style="margin-top:14px;">
                            <button class="post-action-item ${isLiked ? 'liked' : ''}" id="like-btn-${postId}">
                                <svg viewBox="0 0 24 24"><path fill="none" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                <span>${likesArray.length}</span>
                            </button>
                            <button class="post-action-item">
                                <svg viewBox="0 0 24 24"><path fill="none" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                <span>${commentsArray.length}</span>
                            </button>
                            <button class="post-action-item" onclick="sharePostLink('${postId}')">
                                <svg viewBox="0 0 24 24"><path fill="none" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                            </button>
                        </div>

                        <div class="post-comments-section">${commentsHtml}</div>
                        
                        <div class="comment-input-row">
                            <input type="text" id="comment-input-${postId}" placeholder="Add a comment...">
                            <button class="friend-btn" onclick="submitPostComment('${postId}', 'comment-input-${postId}')">Post</button>
                        </div>

                        <div class="post-time">${new Date(post.timestamp).toLocaleDateString()}</div>
                    </div>
                `;

                card.querySelector(`#like-btn-${postId}`).addEventListener('click', () => togglePostLike(postId, likesArray));
                card.querySelector(`#post-author-hdr-${postId}`).addEventListener('click', async () => {
                    const userSnap = await getDoc(doc(db, "users", post.authorUid));
                    if(userSnap.exists()) renderProfileCard(userSnap.data(), post.authorUid === currentUser.uid);
                });

                feedContainer.appendChild(card);
            });
        }

        toggleAuthModeBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if(isSignUpMode) {
                primaryAuthBtn.innerText = "Register";
                toggleAuthModeBtn.innerText = "Already have an account? Sign In";
            } else {
                primaryAuthBtn.innerText = "Sign In";
                toggleAuthModeBtn.innerText = "Create New Account";
            }
        });

        const transformFileToBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = e => rej(e);
        });

        primaryAuthBtn.addEventListener('click', () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if(!email || !password) { alert("Complete parameters."); return; }

            loadingScreen.style.display = 'block';
            loginContainer.style.display = 'none';

            if(isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password).catch(err => { alert(err.message); resetAuthUI(); });
            } else {
                signInWithEmailAndPassword(auth, email, password).catch(err => { alert(err.message); resetAuthUI(); });
            }
        });

        function resetAuthUI() {
            loadingScreen.style.display = 'none';
            loginContainer.style.display = 'block';
        }

        document.getElementById('google-login-btn').addEventListener('click', () => { 
            signInWithPopup(auth, provider).catch(err => { alert(err.message); }); 
        });

        window.triggerLogoutSession = function() {
            signOut(auth).then(() => { location.reload(); });
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    loadingScreen.style.display = 'none';
                    if(snap.exists()) {
                        userDataRecord = snap.data();
                        launchDashboard(userDataRecord);
                    } else { showProfileSetup(user); }
                } catch(err) {
                    showProfileSetup(user);
                }
            } else {
                loadingScreen.style.display = 'none';
                loginContainer.style.display = 'block';
                dashboardContainer.style.display = 'none';
                profileSetupContainer.style.display = 'none';
            }
        });

        function showProfileSetup(user) {
            loadingScreen.style.display = 'none';
            loginContainer.style.display = 'none';
            profileSetupContainer.style.display = 'block';
            if(user.displayName) document.getElementById('setup-name').value = user.displayName;
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('setup-name').value;
            const profileData = { uid: currentUser.uid, username, fullName, description: "", friends: [] };
            profileData.photoURL = "https://api.dicebear.com/7.x/avataaars/svg?seed=" + username;
            
            try {
                await setDoc(doc(db, "users", currentUser.uid), profileData);
                userDataRecord = profileData;
                launchDashboard(profileData);
            } catch(e) { alert(e.message); }
        });

        function launchDashboard(data) {
            profileSetupContainer.style.display = 'none';
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'flex';
            document.getElementById('dash-avatar').src = data.photoURL;
            document.getElementById('dash-display-name').innerText = data.fullName;
            document.getElementById('dash-username').innerText = "@" + data.username;
            
            onSnapshot(collection(db, "statuses"), (snapshot) => {
                activeStatusDatabase = {};
                snapshot.forEach(doc => { activeStatusDatabase[doc.id] = doc.data(); });
                loadFriendsSidebarList();
            });

            onSnapshot(query(collection(db, "globalFeed"), orderBy("timestamp", "desc")), (snapshot) => {
                globalCachedFeedPosts = [];
                snapshot.forEach(postDoc => {
                    globalCachedFeedPosts.push({
                        id: postDoc.id,
                        data: postDoc.data()
                    });
                });
                processFilterSearchRender();
            });
        }

        statusFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const convertedBase64 = await transformFileToBase64(file);
                await setDoc(doc(db, "statuses", currentUser.uid), {
                    uid: currentUser.uid,
                    fullName: userDataRecord.fullName,
                    photoURL: userDataRecord.photoURL,
                    mediaUrl: convertedBase64,
                    type: file.type.startsWith('video/') ? 'video' : 'image',
                    timestamp: Date.now()
                });
                alert("Story updated successfully!");
            } catch(err) { alert("Failed to convert media assets."); }
        });

        document.getElementById('feed-post-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(file) {
                selectedFeedFileBase64 = await transformFileToBase64(file);
                document.getElementById('feed-file-preview-label').style.display = 'block';
            }
        });

        document.getElementById('submit-feed-post-btn').addEventListener('click', async () => {
            const text = document.getElementById('feed-post-text').value.trim();
            if(!text && !selectedFeedFileBase64) return;
            
            const fileInput = document.getElementById('feed-post-file');
            const fileType = (fileInput.files[0] && fileInput.files[0].type.startsWith('video/')) ? 'video' : 'image';

            await addDoc(collection(db, "globalFeed"), {
                authorUid: currentUser.uid,
                authorName: userDataRecord.fullName,
                authorUsername: userDataRecord.username,
                authorPhoto: userDataRecord.photoURL,
                text: text,
                mediaUrl: selectedFeedFileBase64,
                mediaType: fileType,
                likes: [],
                comments: [],
                timestamp: Date.now()
            });

            document.getElementById('feed-post-text').value = "";
            selectedFeedFileBase64 = "";
            fileInput.value = "";
            document.getElementById('feed-file-preview-label').style.display = 'none';
        });

        chatImageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const convertedBase64 = await transformFileToBase64(file);
            sendCustomPayload(file.type.startsWith('video/') ? 'video' : 'image', convertedBase64);
        });

        voiceRecordBtn.addEventListener('click', async () => {
            if (!mediaRecorder) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Audio processing setup error.");
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const convertedAudioBase64 = await transformFileToBase64(audioBlob);
                        sendCustomPayload("voice", convertedAudioBase64);
                        stream.getTracks().forEach(track => track.stop());
                        mediaRecorder = null;
                        voiceRecordBtn.classList.remove('recording');
                    };
                    mediaRecorder.start();
                    voiceRecordBtn.classList.add('recording');
                } catch (err) { alert("Mic operation error: " + err.message); }
            } else {
                mediaRecorder.stop();
            }
        });

        async function sendCustomPayload(type, mediaLink) {
            if (!activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            await addDoc(collection(db, "messages", roomKey, "records"), {
                senderId: currentUser.uid,
                text: type === "text" ? messageInput.value.trim() : "",
                type: type,
                mediaUrl: mediaLink || "",
                timestamp: Date.now()
            });
            messageInput.value = "";
        }

        async function loadFriendsSidebarList() {
            friendsListElement.innerHTML = "";
            statusTray.innerHTML = "";
            const uids = userDataRecord.friends || [];
            const filterText = searchInput.value.trim().toLowerCase();

            if (activeStatusDatabase[currentUser.uid]) {
                createStatusTrayIcon(activeStatusDatabase[currentUser.uid]);
            }

            for(let fUid of uids) {
                const fSnap = await getDoc(doc(db, "users", fUid));
                if(fSnap.exists()) {
                    const fData = fSnap.data();
                    
                    if(filterText && !fData.username.toLowerCase().includes(filterText)) continue;

                    if (activeStatusDatabase[fUid]) {
                        createStatusTrayIcon(activeStatusDatabase[fUid]);
                    }
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `<img src="${fData.photoURL}"><div class="info"><h4>${fData.fullName}</h4><p>@${fData.username}</p></div>`;
                    item.addEventListener('click', () => openChatWindow(fData));
                    friendsListElement.appendChild(item);
                }
            }
        }

        function createStatusTrayIcon(statusData) {
            const wrap = document.createElement('div');
            wrap.className = 'story-item';
            wrap.innerHTML = `<div class="story-avatar-wrap"><img src="${statusData.photoURL}"></div><span>${statusData.uid === currentUser.uid ? 'Your Story' : statusData.fullName}</span>`;
            wrap.addEventListener('click', () => {
                document.getElementById('status-author-name').innerText = statusData.fullName + "'s Story";
                const imgEl = document.getElementById('status-viewer-img');
                const vidEl = document.getElementById('status-viewer-video');
                imgEl.style.display = 'none'; vidEl.style.display = 'none'; vidEl.pause();

                if (statusData.type === 'video') {
                    vidEl.src = statusData.mediaUrl; vidEl.style.display = 'block';
                } else {
                    imgEl.src = statusData.mediaUrl; imgEl.style.display = 'block';
                }
                document.getElementById('status-viewer-modal').style.display = 'flex';
            });
            statusTray.appendChild(wrap);
        }

        window.closeStatusViewer = function() {
            document.getElementById('status-viewer-video').pause();
            document.getElementById('status-viewer-modal').style.display = 'none';
        };

        function openChatWindow(friendData) {
            activeChatFriendData = friendData;
            document.getElementById('no-chat-fallback').style.display = 'none';
            document.getElementById('active-chat-window').style.display = 'flex';
            document.getElementById('chat-with-heading').innerText = friendData.fullName;
            dashboardContainer.classList.add('chat-active');

            const roomKey = currentUser.uid < friendData.uid ? `${currentUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentUser.uid}`;

            if(unsubscribeChatListener) unsubscribeChatListener();
            if(unsubscribeTypingListener) unsubscribeTypingListener();

            unsubscribeTypingListener = onSnapshot(doc(db, "typingStatus", roomKey), (docSnap) => {
                if(docSnap.exists() && docSnap.data()[friendData.uid]) { chatTypingIndicator.style.display = 'inline'; } 
                else { chatTypingIndicator.style.display = 'none'; }
            });

            unsubscribeChatListener = onSnapshot(query(collection(db, "messages", roomKey, "records"), orderBy("timestamp", "asc")), (snapshot) => {
                messagesBox.innerHTML = "";
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    const bubble = document.createElement('div');
                    const isSent = msg.senderId === currentUser.uid;
                    bubble.className = `msg ${isSent ? 'sent' : 'received'}`;
                    
                    let innerTemplate = "";
                    if (msg.type === "image") {
                        innerTemplate = `<img src="${msg.mediaUrl}">`;
                    } else if (msg.type === "video") {
                        innerTemplate = `<video src="${msg.mediaUrl}" controls></video>`;
                    } else if (msg.type === "voice") {
                        innerTemplate = `<audio src="${msg.mediaUrl}" controls></audio>`;
                    } else {
                        innerTemplate = `<p>${msg.text}</p>`;
                    }

                    bubble.innerHTML = `
                        ${innerTemplate}
                        <div class="msg-meta-row">
                            <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    `;
                    messagesBox.appendChild(bubble);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        messageInput.addEventListener('input', () => {
            if(!activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: true }, { merge: true });
            clearTimeout(window.typingTimeoutEvent);
            window.typingTimeoutEvent = setTimeout(() => {
                setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: false }, { merge: true });
            }, 2000);
        });

        document.getElementById('send-msg-btn').addEventListener('click', () => sendCustomPayload("text", null));
        messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendCustomPayload("text", null); });

        window.exitChatToSidebar = function() { dashboardContainer.classList.remove('chat-active'); };
    </script>
</body>
</html>
