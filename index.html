<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniqueChatHub - Login & Setup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #444;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        .input-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .optional-tag {
            font-size: 12px;
            color: #9ca3af;
            font-weight: normal;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            margin: 20px 0;
            color: #aaa;
            position: relative;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #ddd;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .google-btn img {
            width: 18px;
            height: 18px;
        }

        .profile-pic-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .avatar-preview-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #667eea;
            margin-bottom: 12px;
            background: #eee;
        }

        .avatar-preview-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-upload-btn {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-container" class="form-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to enter your workspace</p>
        
        <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button id="email-login-btn" class="main-btn">Sign In</button>

        <div class="divider">or</div>

        <button id="google-login-btn" class="google-btn">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <h2>Complete Your Profile</h2>
        <p class="subtitle">Just a few more details to get you started</p>
        
        <form id="profile-form">
            <div class="profile-pic-group">
                <div class="avatar-preview-wrapper">
                    <img id="avatar-preview" src="https://via.placeholder.com/150" alt="Preview">
                </div>
                <label for="profile-pic-input" class="file-upload-btn">Choose Profile Picture</label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>

            <div class="input-group">
                <label for="setup-name">Full Name</label>
                <input type="text" id="setup-name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="setup-birthday">Birthday</label>
                <input type="date" id="setup-birthday" required>
            </div>

            <div class="input-group">
                <label for="setup-phone">Phone Number <span class="optional-tag">(Optional)</span></label>
                <input type="tel" id="setup-phone" placeholder="+1 (555) 000-0000">
            </div>

            <button type="submit" class="main-btn">Save & Continue</button>
        </form>
    </div>

    <div id="dashboard-container" class="form-container" style="display: none;">
        <h2>Welcome to UniqueChatHub!</h2>
        <p class="subtitle">Your profile setup is complete.</p>
        <p>Loading your chat channels workspace...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa",
            measurementId: "G-KFELX29065"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        
        const googleLoginBtn = document.getElementById('google-login-btn');
        const profilePicInput = document.getElementById('profile-pic-input');
        const avatarPreview = document.getElementById('avatar-preview');
        const profileForm = document.getElementById('profile-form');

        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    showProfileSetup(result.user);
                })
                .catch((error) => {
                    alert("Auth Error: " + error.message);
                });
        });

        function showProfileSetup(user) {
            loginContainer.style.display = 'none';
            profileSetupContainer.style.display = 'block';
            if (user.displayName) document.getElementById('setup-name').value = user.displayName;
            if (user.photoURL) avatarPreview.src = user.photoURL;
        }

        profilePicInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarPreview.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        profileForm.addEventListener('submit', function(e) {
            e.preventDefault();
            profileSetupContainer.style.display = 'none';
            dashboardContainer.style.display = 'block';
        });
    </script>
</body>
</html>
