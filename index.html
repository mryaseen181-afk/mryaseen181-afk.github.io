<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniqueChatHub - Workspace Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --sidebar-bg: rgba(248, 250, 252, 0.85);
            --chat-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --input-bg: #f1f5f9;
            --msg-received-bg: #e2e8f0;
            --header-bg: #f1f5f9;
            --accent-purple: #475569;
            --accent-glow: linear-gradient(135deg, #64748b 0%, #334155 100%);
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            --panel-bg: rgba(255, 255, 255, 0.95);
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --msg-received-bg: #f1f5f9;
            --header-bg: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 20px; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            overflow: hidden;
        }

        #loading-screen { color: #334155; font-size: 18px; font-weight: 600; }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .dashboard-layout {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: var(--panel-bg);
            border-radius: 24px;
            display: flex;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 5;
            flex-shrink: 0;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color);
        }
        .brand-logo { width: 32px; height: 32px; }
        .brand-title { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; color: #334155; }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color);
        }
        .user-bar img {
            width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--border-color); cursor: pointer;
        }
        .user-details { flex: 1; cursor: pointer; min-width: 0; }
        .user-details h3 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-details p { color: var(--text-muted); font-size: 11.5px; font-weight: 500; }
        .settings-icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }

        /* Instagram Stories Component Tray */
        .instagram-stories-tray {
            display: flex;
            gap: 14px;
            padding: 12px 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255,255,255,0.4);
        }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 56px;
            cursor: pointer;
        }
        .story-avatar-wrap {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            padding: 2.5px;
            background: var(--insta-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .story-avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffffff;
        }
        .story-item span {
            font-size: 10.5px;
            color: var(--text-color);
            margin-top: 4px;
            max-width: 58px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .friend-system { padding: 12px 16px; border-bottom: 1px solid var(--border-color); position: relative; }
        .friend-input-group {
            display: flex; gap: 8px; background: var(--input-bg); padding: 4px 6px; border-radius: 24px; border: 1px solid var(--border-color);
        }
        .friend-input-group input { flex: 1; padding: 6px 10px; background: transparent; border: none; color: var(--text-color); font-size: 13.5px; outline: none; }
        .friend-btn { padding: 0 14px; background: var(--accent-glow); color: white; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 12.5px; }

        .search-suggestions-dropdown {
            position: absolute; top: 58px; left: 16px; right: 16px; background: #ffffff; border: 1px solid var(--border-color); border-radius: 14px; box-shadow: 0 12px 24px rgba(0,0,0,0.1); max-height: 180px; overflow-y: auto; z-index: 50; display: none;
        }
        .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; }
        .suggestion-item:hover { background: #f1f5f9; }
        .suggestion-item img { width: 28px; height: 28px; border-radius: 50%; }

        .friends-list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .friends-list-heading { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; padding-left: 8px; letter-spacing: 0.08em; }
        
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 14px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all 0.2s; }
        .friend-item:hover { background: rgba(0, 0, 0, 0.02); }
        .friend-item.active { background: #e2e8f0; border-color: var(--border-color); }
        .friend-item.favorited { border-left: 4px solid #f59e0b; }
        .friend-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .friend-item .info { flex: 1; min-width: 0; }
        .friend-item .info h4 { font-size: 13.5px; font-weight: 600; }
        .friend-item .info p { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; min-width: 0; }
        .chat-header { padding: 16px 20px; background: rgba(0, 0, 0, 0.01); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; }
        .chat-header-meta { display: flex; flex-direction: column; }
        .typing-indicator-span { font-size: 11px; color: #10b981; font-weight: 600; display: none; }
        
        .back-arrow { display: none; background: none; border: none; font-size: 20px; cursor: pointer; }
        .view-profile-btn { background: #f1f5f9; border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 600; }
        .chat-header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; position: relative; }
        .options-trigger { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; }
        
        .context-menu { display: none; position: absolute; right: 0; top: 35px; background: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 20; min-width: 130px; }
        .context-menu button { width: 100%; padding: 10px 14px; background: none; border: none; text-align: left; cursor: pointer; font-size: 12.5px; }
        .context-menu button:hover { background: #f1f5f9; }

        .messages-box { flex: 1; overflow-y: auto; padding: 20px 24px 110px 24px; display: flex; flex-direction: column; gap: 14px; }
        
        /* Message Engine Elements with WhatsApp/Instagram Extensions */
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.45; position: relative; cursor: pointer; user-select: none; }
        .msg.sent { background: var(--accent-glow); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--msg-received-bg); color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        /* WhatsApp Meta Layout Row */
        .msg-meta-row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 10px; opacity: 0.75; }
        .msg.sent .msg-meta-row { color: #e2e8f0; }
        .msg.received .msg-meta-row { color: var(--text-muted); }
        .whatsapp-status-ticks { font-size: 11px; color: #38bdf8; }

        /* Instagram Double Tap Heart Reaction Overlay */
        .insta-heart-react {
            position: absolute; bottom: -10px; right: 10px; background: #ffffff;
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 2px 6px; font-size: 11px; display: flex; align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08); z-index: 2;
        }

        .chat-input-container-floating {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 680px; background: #ffffff; border: 1px solid var(--border-color); padding: 8px 10px; border-radius: 35px; display: flex; gap: 8px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 10;
        }
        .chat-input-container-floating input[type="text"] { flex: 1; padding: 10px 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 26px; color: var(--text-color); font-size: 13.5px; outline: none; }
        
        .attach-btn, .mic-btn { background: #f1f5f9; border: 1px solid var(--border-color); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .attach-btn svg, .mic-btn svg { width: 16px; height: 16px; fill: none; stroke: #475569; stroke-width: 2; }
        .mic-btn.recording { background: #ef4444; border-color: #ef4444; animation: pulseRecord 1.5s infinite; }
        .mic-btn.recording svg { stroke: #ffffff; }

        @keyframes pulseRecord { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        .send-btn { width: 38px; height: 38px; background: var(--accent-glow); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card-bg); padding: 26px; border-radius: 20px; border: 1px solid var(--border-color); width: 100%; max-width: 380px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 12px; right: 16px; font-size: 22px; color: var(--text-muted); cursor: pointer; }

        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; font-size: 12.5px; margin-bottom: 4px; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 13.5px; background-color: var(--input-bg); color: var(--text-color); outline: none; }
        
        .main-btn { width: 100%; padding: 11px; background: var(--accent-glow); color: white; border: none; border-radius: 10px; font-size: 13.5px; font-weight: bold; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 11px; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 10px; font-size: 13.5px; cursor: pointer; margin-top: 6px; }
        .danger-btn { width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 10px; font-size: 13.5px; cursor: pointer; margin-top: 8px; }
        
        .google-btn { width: 100%; padding: 11px; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; font-size: 13.5px; }
        .avatar-preview-wrapper { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border-color); margin-bottom: 10px; }
        .file-upload-btn { background: #f1f5f9; border: 1px solid var(--border-color); padding: 5px 14px; border-radius: 20px; font-size: 11.5px; cursor: pointer; }
        .no-chat-selected { flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 13.5px; }

        /* Instagram Story Viewing Modal Box Container */
        #story-viewer-modal img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 12px; margin-top: 10px; }

        @media (max-width: 640px) {
            body { padding: 0; }
            .dashboard-layout { height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100%; }
            .chat-area { display: none; }
            .dashboard-layout.chat-active .sidebar { display: none; }
            .dashboard-layout.chat-active .chat-area { display: flex; }
            .back-arrow { display: block; }
            .chat-input-container-floating { width: 94%; bottom: 12px; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">Syncing responsive node engine...</div>

    <div id="login-container" class="form-container" style="display: none;">
        <h2>Welcome Back</h2>
        <p style="color:var(--text-muted); font-size:13px; margin-bottom:16px;">Enter the UniqueChatHub workspace</p>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button id="email-login-btn" class="main-btn">Sign In</button>
        <div style="margin:12px 0; color:var(--text-muted); font-size:12px;">or</div>
        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:16px; height:16px;">
            Sign in with Google
        </button>
        <button id="new-account-btn" class="secondary-btn">✨ Create a New Account</button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <h2>Create Profile</h2>
        <p style="color:var(--text-muted); font-size:13px; margin-bottom:16px;">Set up your identity</p>
        <form id="profile-form">
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 16px;">
                <div class="avatar-preview-wrapper"><img id="avatar-preview" src="https://via.placeholder.com/150" style="width:100%; height:100%; object-fit:cover;"></div>
                <label for="profile-pic-input" class="file-upload-btn">Choose Picture</label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>
            <div class="input-group">
                <label>Unique Username</label>
                <input type="text" id="setup-username" placeholder="username123" required>
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="setup-name" placeholder="Alex Carter" required>
            </div>
            <button type="submit" class="main-btn">Launch Workspace</button>
        </form>
    </div>

    <div id="dashboard-container" class="dashboard-layout" style="display: none;">
        <div class="sidebar">
            <div class="brand-header">
                <svg class="brand-logo" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="14" fill="#64748b" opacity="0.15"/>
                    <path d="M16 4C9.37 4 4 9.37 4 16c0 2.61.84 5.03 2.25 7L5 27l4.13-1.16c1.81.75 3.8 1.16 5.87 1.16 6.63 0 12-5.37 12-12S22.63 4 16 4zm-2 15l-4-4 1.41-1.41L14 16.17l5.59-5.59L21 12l-7 7z" fill="#475569"/>
                </svg>
                <span class="brand-title">UNIQUECHATHUB</span>
            </div>

            <div class="user-bar">
                <img id="dash-avatar" src="" onclick="openSettingsModal()">
                <div class="user-details" onclick="openSettingsModal()">
                    <h3 id="dash-display-name">Loading...</h3>
                    <p id="dash-username"></p>
                </div>
                <button class="settings-icon-btn" onclick="openSettingsModal()">⚙️</button>
            </div>

            <div id="stories-tray" class="instagram-stories-tray"></div>

            <div class="friend-system">
                <div class="friend-input-group">
                    <input type="text" id="friend-username-input" placeholder="Add friend by username..." autocomplete="off">
                    <button id="add-friend-btn" class="friend-btn">Add</button>
                </div>
                <div id="search-suggestions" class="search-suggestions-dropdown"></div>
            </div>
            
            <div class="friends-list-container">
                <div class="friends-list-heading">Direct Messages</div>
                <div id="friends-list"></div>
            </div>
        </div>

        <div class="chat-area">
            <div id="active-chat-window" style="display: none; flex-direction: column; flex: 1; height: 100%;">
                <div class="chat-header">
                    <button class="back-arrow" onclick="exitChatToSidebar()">⬅</button>
                    <div class="chat-header-meta">
                        <h3 id="chat-with-heading">Chat</h3>
                        <span id="chat-typing-indicator" class="typing-indicator-span">typing...</span>
                    </div>
                    <div class="chat-header-actions">
                        <button id="view-friend-profile-header-btn" class="view-profile-btn">Profile</button>
                        <button id="header-chat-options-trigger" class="options-trigger" onclick="triggerActiveHeaderContextMenu(event)">⋮</button>
                        <div id="header-active-context" class="context-menu">
                            <button id="context-action-header-fav-btn">Favorite</button>
                            <button id="context-action-header-clear-btn">Clear Chat</button>
                            <button id="context-action-header-block-btn" style="color:#ef4444;">Block</button>
                        </div>
                    </div>
                </div>
                
                <div id="messages-box" class="messages-box"></div>
                
                <div class="chat-input-container-floating">
                    <label for="chat-image-input" class="attach-btn">
                        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </label>
                    <input type="file" id="chat-image-input" accept="image/*" style="display: none;">
                    
                    <button id="voice-record-btn" class="mic-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 1c-1.66 0-3 1.34-3 3v8c0 1.66 1.34 3 3 3s3-1.34 3-3V4c0-1.66-1.34-3-3-3z"/>
                            <path d="M19 10v1c0 3.53-2.61 6.44-6 6.93V21h-2v-3.07c-3.39-.49-6-3.4-6-6.93v-1h2v1c0 2.76 2.24 5 5 5s5-2.24 5-5v-1h2z"/>
                        </svg>
                    </button>

                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-msg-btn" class="send-btn">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
            <div id="no-chat-fallback" class="no-chat-selected">
                <p>Select a friend to begin workspace messaging</p>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeSettingsModal()">&times;</span>
            <h2>Settings Hub</h2>
            <br>
            <div class="input-group">
                <label>Theme Mode</label>
                <button class="main-btn" id="theme-toggle-btn" onclick="toggleThemeInterface()" style="background:#4b5563;">Switch to Light Mode</button>
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="settings-fullname-input">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="settings-username-input">
            </div>
            <button class="main-btn" onclick="saveSettingsChanges()">Save Updates</button>
            <button class="danger-btn" onclick="triggerLogoutSession()">Log Out</button>
        </div>
    </div>

    <div id="story-viewer-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('story-viewer-modal').style.display='none'">&times;</span>
            <h3 id="story-author-name">Story</h3>
            <img id="story-viewer-img" src="" alt="Story Stream Content Layer">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc, deleteDoc, startAt, endAt } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loadingScreen = document.getElementById('loading-screen');
        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const suggestionsDropdown = document.getElementById('search-suggestions');
        const friendsListElement = document.getElementById('friends-list');
        const messagesBox = document.getElementById('messages-box');
        const messageInput = document.getElementById('message-input');
        const chatTypingIndicator = document.getElementById('chat-typing-indicator');
        const storiesTray = document.getElementById('stories-tray');

        let currentUser = null;
        let userDataRecord = null;
        let activeChatFriendData = null;
        let unsubscribeChatListener = null;
        let unsubscribeTypingListener = null;
        let currentThemeMode = "dark";
        let favoriteUsersList = [];
        let blockedUsersList = [];

        window.openSettingsModal = function() {
            document.getElementById('settings-fullname-input').value = userDataRecord.fullName;
            document.getElementById('settings-username-input').value = userDataRecord.username;
            document.getElementById('settings-modal').style.display = 'flex';
        }
        window.closeSettingsModal = function() { document.getElementById('settings-modal').style.display = 'none'; }
        window.exitChatToSidebar = function() { dashboardContainer.classList.remove('chat-active'); }

        window.toggleThemeInterface = function() {
            if(currentThemeMode === "dark") {
                document.body.setAttribute('data-theme', 'light');
                currentThemeMode = "light";
            } else {
                document.body.removeAttribute('data-theme');
                currentThemeMode = "dark";
            }
        }

        window.triggerActiveHeaderContextMenu = function(e) {
            e.stopPropagation();
            const menu = document.getElementById('header-active-context');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('click', () => {
            const menu = document.getElementById('header-active-context');
            if(menu) menu.style.display = 'none';
        });

        // Auth Observers
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, "users", user.uid));
                loadingScreen.style.display = 'none';
                if(snap.exists()) {
                    userDataRecord = snap.data();
                    launchDashboard(userDataRecord);
                } else { showProfileSetup(user); }
            } else {
                loadingScreen.style.display = 'none';
                loginContainer.style.display = 'block';
                dashboardContainer.style.display = 'none';
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => { signInWithPopup(auth, provider); });
        document.getElementById('new-account-btn').addEventListener('click', () => { signOut(auth); });

        function showProfileSetup(user) {
            loginContainer.style.display = 'none';
            profileSetupContainer.style.display = 'block';
            if(user.displayName) document.getElementById('setup-name').value = user.displayName;
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('setup-name').value;
            const profileData = { uid: currentUser.uid, username, fullName, photoURL: currentUser.photoURL || "https://via.placeholder.com/150", friends: [] };
            await setDoc(doc(db, "users", currentUser.uid), profileData);
            userDataRecord = profileData;
            launchDashboard(profileData);
        });

        function launchDashboard(data) {
            profileSetupContainer.style.display = 'none';
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'flex';
            document.getElementById('dash-avatar').src = data.photoURL;
            document.getElementById('dash-display-name').innerText = data.fullName;
            document.getElementById('dash-username').innerText = "@" + data.username;
            loadFriendsSidebarList();
        }

        // WhatsApp Style Typing Tracking Controls
        messageInput.addEventListener('input', () => {
            if(!activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: true }, { merge: true });
            
            clearTimeout(window.typingTimeoutEvent);
            window.typingTimeoutEvent = setTimeout(() => {
                setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: false }, { merge: true });
            }, 2000);
        });

        async function loadFriendsSidebarList() {
            friendsListElement.innerHTML = "";
            storiesTray.innerHTML = "";
            const uids = userDataRecord.friends || [];

            // Self Story Icon Option (Instagram Style Element Add Mock)
            createStoryIcon(userDataRecord, true);

            for(let fUid of uids) {
                const fSnap = await getDoc(doc(db, "users", fUid));
                if(fSnap.exists()) {
                    const fData = fSnap.data();
                    createStoryIcon(fData, false);

                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `
                        <img src="${fData.photoURL}">
                        <div class="info">
                            <h4>${fData.fullName}</h4>
                            <p>@${fData.username}</p>
                        </div>
                    `;
                    item.addEventListener('click', () => openChatWindow(fData));
                    friendsListElement.appendChild(item);
                }
            }
        }

        function createStoryIcon(user, isSelf) {
            const wrap = document.createElement('div');
            wrap.className = 'story-item';
            wrap.innerHTML = `
                <div class="story-avatar-wrap"><img src="${user.photoURL}"></div>
                <span>${isSelf ? 'Your Story' : user.fullName}</span>
            `;
            wrap.addEventListener('click', () => {
                document.getElementById('story-author-name').innerText = user.fullName;
                document.getElementById('story-viewer-img').src = user.photoURL; // Simple fallback viewer logic
                document.getElementById('story-viewer-modal').style.display = 'flex';
            });
            storiesTray.appendChild(wrap);
        }

        function openChatWindow(friendData) {
            activeChatFriendData = friendData;
            document.getElementById('no-chat-fallback').style.display = 'none';
            document.getElementById('active-chat-window').style.display = 'flex';
            document.getElementById('chat-with-heading').innerText = friendData.fullName;
            dashboardContainer.classList.add('chat-active');

            const roomKey = currentUser.uid < friendData.uid ? `${currentUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentUser.uid}`;

            if(unsubscribeChatListener) unsubscribeChatListener();
            if(unsubscribeTypingListener) unsubscribeTypingListener();

            // WhatsApp Real-time Active Typing Monitoring
            unsubscribeTypingListener = onSnapshot(doc(db, "typingStatus", roomKey), (docSnap) => {
                if(docSnap.exists() && docSnap.data()[friendData.uid]) {
                    chatTypingIndicator.style.display = 'block';
                } else {
                    chatTypingIndicator.style.display = 'none';
                }
            });

            // Message Loader Stream Logic
            unsubscribeChatListener = onSnapshot(query(collection(db, "messages", roomKey, "records"), orderBy("timestamp", "asc")), (snapshot) => {
                messagesBox.innerHTML = "";
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    const bubble = document.createElement('div');
                    const isSent = msg.senderId === currentUser.uid;
                    bubble.className = `msg ${isSent ? 'sent' : 'received'}`;
                    
                    // Render content inside layout wrappers
                    let contentHtml = `<p>${msg.text}</p>`;
                    
                    // Add Instagram Quick Reaction Hearts Layer
                    if(msg.reacted) {
                        contentHtml += `<div class="insta-heart-react">❤️ 1</div>`;
                    }
                    
                    // Add WhatsApp Layout Status Checkmarks
                    contentHtml += `
                        <div class="msg-meta-row">
                            <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${isSent ? '<span class="whatsapp-status-ticks">✓✓</span>' : ''}
                        </div>
                    `;

                    bubble.innerHTML = contentHtml;

                    // Instagram Double Click Heart Reaction Trigger Handler
                    bubble.addEventListener('dblclick', async () => {
                        await updateDoc(doc(db, "messages", roomKey, "records", msgDoc.id), {
                            reacted: !msg.reacted
                        });
                    });

                    messagesBox.appendChild(bubble);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        document.getElementById('send-msg-btn').addEventListener('click', sendTextMessage);
        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const inputVal = document.getElementById('friend-username-input').value.trim().toLowerCase();
            const snap = await getDocs(query(collection(db, "users"), where("username", "==", inputVal)));
            if(!snap.empty) {
                const targetUid = snap.docs[0].data().uid;
                let currentFriendsList = userDataRecord.friends || [];
                if(!currentFriendsList.includes(targetUid)) {
                    currentFriendsList.push(targetUid);
                    await updateDoc(doc(db, "users", currentUser.uid), { friends: currentFriendsList });
                    userDataRecord.friends = currentFriendsList;
                    loadFriendsSidebarList();
                }
            }
            document.getElementById('friend-username-input').value = "";
        });

        async function sendTextMessage() {
            const text = messageInput.value.trim();
            if(!text || !activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            
            const payload = {
                senderId: currentUser.uid,
                text: text,
                timestamp: new Date().getTime(),
                reacted: false
            };
            messageInput.value = "";
            await addDoc(collection(db, "messages", roomKey, "records"), payload);
        }

        window.triggerLogoutSession = function() { signOut(auth).then(() => location.reload()); }
    </script>
</body>
</html>
