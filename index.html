<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniqueChatHub - Workspace Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --sidebar-bg: rgba(248, 250, 252, 0.85);
            --chat-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --input-bg: #f1f5f9;
            --msg-received-bg: #e2e8f0;
            --header-bg: #f1f5f9;
            --accent-glow: linear-gradient(135deg, #64748b 0%, #334155 100%);
            --whatsapp-green: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            overflow: hidden;
        }

        #loading-screen { color: #334155; font-size: 18px; font-weight: 600; }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .dashboard-layout {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: var(--panel-bg);
            border-radius: 24px;
            display: flex;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 5;
            flex-shrink: 0;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color);
        }
        .brand-title { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; color: #334155; }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color);
        }
        .user-bar img {
            width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--border-color);
        }
        .user-details { flex: 1; min-width: 0; }
        .user-details h3 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-details p { color: var(--text-muted); font-size: 11.5px; font-weight: 500; }
        
        .status-upload-action-btn {
            background: #f1f5f9; border: 1px solid var(--border-color); font-size: 12px;
            padding: 6px 10px; border-radius: 14px; font-weight: 600; cursor: pointer;
        }

        .whatsapp-status-tray {
            display: none;
            gap: 14px;
            padding: 12px 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: rgba(37, 211, 102, 0.06);
        }
        .status-item { display: flex; flex-direction: column; align-items: center; min-width: 56px; cursor: pointer; }
        .status-avatar-wrap {
            width: 52px; height: 52px; border-radius: 50%; padding: 3px;
            border: 2px dashed var(--whatsapp-green); display: flex; justify-content: center; align-items: center;
        }
        .status-avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-item span { font-size: 10.5px; margin-top: 4px; max-width: 58px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .friend-system { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        .friend-input-group { display: flex; gap: 8px; background: var(--input-bg); padding: 4px 6px; border-radius: 24px; border: 1px solid var(--border-color); }
        .friend-input-group input { flex: 1; padding: 6px 10px; background: transparent; border: none; color: var(--text-color); font-size: 13.5px; outline: none; }
        .friend-btn { padding: 0 14px; background: var(--accent-glow); color: white; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 12.5px; }

        .friends-list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .friends-list-heading { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; padding-left: 8px; }
        
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 14px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; }
        .friend-item:hover { background: rgba(0, 0, 0, 0.02); }
        .friend-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .friend-item .info h4 { font-size: 13.5px; font-weight: 600; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; min-width: 0; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; }
        .chat-header-meta { display: flex; flex-direction: column; }
        .typing-indicator-span { font-size: 11px; color: #10b981; font-weight: 600; display: none; }
        
        .back-arrow { display: none; background: none; border: none; font-size: 20px; cursor: pointer; }
        .messages-box { flex: 1; overflow-y: auto; padding: 20px 24px 110px 24px; display: flex; flex-direction: column; gap: 14px; }
        
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.45; }
        .msg.sent { background: var(--accent-glow); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--msg-received-bg); color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; max-height: 200px; object-fit: cover; }
        .msg audio { display: block; margin-top: 5px; max-width: 100%; }
        .msg.sent audio { filter: invert(1) hue-rotate(180deg); }

        .msg-meta-row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 10px; opacity: 0.75; }
        .whatsapp-status-ticks { font-size: 11px; color: #38bdf8; }

        .chat-input-container-floating {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 680px; background: #ffffff; border: 1px solid var(--border-color); padding: 8px 10px; border-radius: 35px; display: flex; gap: 8px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 10;
        }
        .chat-input-container-floating input[type="text"] { flex: 1; padding: 10px 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 26px; color: var(--text-color); font-size: 13.5px; outline: none; }
        
        .attach-btn, .mic-btn { background: #f1f5f9; border: 1px solid var(--border-color); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .attach-btn svg, .mic-btn svg { width: 16px; height: 16px; fill: none; stroke: #475569; stroke-width: 2; }
        .mic-btn.recording { background: #ef4444; border-color: #ef4444; animation: pulseRecord 1.5s infinite; }
        .mic-btn.recording svg { stroke: #ffffff; }

        @keyframes pulseRecord { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        .send-btn { width: 38px; height: 38px; background: var(--accent-glow); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card-bg); padding: 26px; border-radius: 20px; border: 1px solid var(--border-color); width: 100%; max-width: 380px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 12px; right: 16px; font-size: 22px; color: var(--text-muted); cursor: pointer; }

        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; font-size: 12.5px; margin-bottom: 4px; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 13.5px; background-color: var(--input-bg); color: var(--text-color); outline: none; }
        
        .main-btn { width: 100%; padding: 11px; background: var(--accent-glow); color: white; border: none; border-radius: 10px; font-size: 13.5px; font-weight: bold; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 11px; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 10px; font-size: 13.5px; cursor: pointer; margin-top: 6px; }
        .google-btn { width: 100%; padding: 11px; background: #fff; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 600; }
        
        .no-chat-selected { flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 13.5px; }
        #status-viewer-modal .modal-content { max-width: 500px; background: #000; color: #fff; }
        #status-media-container { width: 100%; min-height: 300px; display: flex; justify-content: center; align-items: center; margin-top: 15px; }
        #status-viewer-img, #status-viewer-video { width: 100%; max-height: 500px; object-fit: contain; border-radius: 8px; }

        @media (max-width: 640px) {
            .dashboard-layout { height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100%; }
            .chat-area { display: none; }
            .dashboard-layout.chat-active .sidebar { display: none; }
            .dashboard-layout.chat-active .chat-area { display: flex; }
            .back-arrow { display: block; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">Syncing responsive node engine...</div>

    <div id="login-container" class="form-container" style="display: none;">
        <h2 id="auth-title">Welcome Back</h2>
        <p style="color:var(--text-muted); font-size:13px; margin-bottom:16px;" id="auth-subtitle">Enter the workspace credentials</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>

        <button id="email-primary-btn" class="main-btn">Sign In</button>
        <button id="auth-toggle-mode-btn" class="secondary-btn">Create a New Account Instead</button>
        
        <div style="margin:12px 0; color:var(--text-muted); font-size:12px;">or</div>
        
        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:16px; height:16px; margin-right: 8px;">
            Sign in with Google
        </button>
    </div>

    <div id="profile-setup-container" class="form-container" style="display: none;">
        <h2>Create Profile Identity</h2>
        <form id="profile-form">
            <div class="input-group">
                <label>Unique Username</label>
                <input type="text" id="setup-username" placeholder="username123" required>
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="setup-name" placeholder="Alex Carter" required>
            </div>
            <button type="submit" class="main-btn">Launch Workspace</button>
        </form>
    </div>

    <div id="dashboard-container" class="dashboard-layout" style="display: none;">
        <div class="sidebar">
            <div class="brand-header">
                <span class="brand-title">UNIQUECHATHUB</span>
                <button onclick="triggerLogoutSession()" style="margin-left:auto; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px;">Logout</button>
            </div>

            <div class="user-bar">
                <img id="dash-avatar" src="">
                <div class="user-details">
                    <h3 id="dash-display-name">Loading...</h3>
                    <p id="dash-username"></p>
                </div>
                <label for="status-file-input" class="status-upload-action-btn">Status ➕</label>
                <input type="file" id="status-file-input" accept="image/*,video/*" style="display:none;">
            </div>

            <div id="status-tray" class="whatsapp-status-tray"></div>

            <div class="friend-system">
                <div class="friend-input-group">
                    <input type="text" id="friend-username-input" placeholder="Add friend by username...">
                    <button id="add-friend-btn" class="friend-btn">Add</button>
                </div>
            </div>
            
            <div class="friends-list-container">
                <div class="friends-list-heading">Direct Messages</div>
                <div id="friends-list"></div>
            </div>
        </div>

        <div class="chat-area">
            <div id="active-chat-window" style="display: none; flex-direction: column; flex: 1; height: 100%;">
                <div class="chat-header">
                    <button class="back-arrow" onclick="exitChatToSidebar()">⬅</button>
                    <div class="chat-header-meta">
                        <h3 id="chat-with-heading">Chat</h3>
                        <span id="chat-typing-indicator" class="typing-indicator-span">typing...</span>
                    </div>
                </div>
                
                <div id="messages-box" class="messages-box"></div>
                
                <div class="chat-input-container-floating">
                    <label for="chat-image-input" class="attach-btn">
                        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </label>
                    <input type="file" id="chat-image-input" accept="image/*,video/*,audio/*" style="display: none;">
                    
                    <button id="voice-record-btn" class="mic-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 1c-1.66 0-3 1.34-3 3v8c0 1.66 1.34 3 3 3s3-1.34 3-3V4c0-1.66-1.34-3-3-3z"/>
                            <path d="M19 10v1c0 3.53-2.61 6.44-6 6.93V21h-2v-3.07c-3.39-.49-6-3.4-6-6.93v-1h2v1c0 2.76 2.24 5 5 5s5-2.24 5-5v-1h2z"/>
                        </svg>
                    </button>

                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-msg-btn" class="send-btn">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
            <div id="no-chat-fallback" class="no-chat-selected">
                <p>Select a friend to begin workspace messaging</p>
            </div>
        </div>
    </div>

    <div id="status-viewer-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStatusViewer()">&times;</span>
            <h3 id="status-author-name" style="text-align: left;">Status Updates</h3>
            <div id="status-media-container">
                <img id="status-viewer-img" style="display:none;">
                <video id="status-viewer-video" controls autoplay style="display:none;"></video>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDTkv84V_QzdV5KqWOhAiWzkXnsYoF30Q",
            authDomain: "commoftheworld.firebaseapp.com", 
            projectId: "commoftheworld",
            storageBucket: "commoftheworld.firebasestorage.app",
            messagingSenderId: "322496812191",
            appId: "1:322496812191:web:1bf0048089df350acb7eaa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loadingScreen = document.getElementById('loading-screen');
        const loginContainer = document.getElementById('login-container');
        const profileSetupContainer = document.getElementById('profile-setup-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const friendsListElement = document.getElementById('friends-list');
        const messagesBox = document.getElementById('messages-box');
        const messageInput = document.getElementById('message-input');
        const chatTypingIndicator = document.getElementById('chat-typing-indicator');
        const statusTray = document.getElementById('status-tray');
        const statusFileInput = document.getElementById('status-file-input');
        const chatImageInput = document.getElementById('chat-image-input');
        const voiceRecordBtn = document.getElementById('voice-record-btn');

        let currentUser = null;
        let userDataRecord = null;
        let activeChatFriendData = null;
        let unsubscribeChatListener = null;
        let unsubscribeTypingListener = null;
        let activeStatusDatabase = {}; 
        let mediaRecorder = null;
        let audioChunks = [];
        let isSignUpMode = false;

        // Unified Email/Password Auth Form Logic Implementation Hook
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const primaryAuthBtn = document.getElementById('email-primary-btn');
        const toggleAuthModeBtn = document.getElementById('auth-toggle-mode-btn');

        toggleAuthModeBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if(isSignUpMode) {
                document.getElementById('auth-title').innerText = "Create Account";
                document.getElementById('auth-subtitle').innerText = "Sign up for a workspace profile";
                primaryAuthBtn.innerText = "Register Now";
                toggleAuthModeBtn.innerText = "Already have an account? Sign In";
            } else {
                document.getElementById('auth-title').innerText = "Welcome Back";
                document.getElementById('auth-subtitle').innerText = "Enter the workspace credentials";
                primaryAuthBtn.innerText = "Sign In";
                toggleAuthModeBtn.innerText = "Create a New Account Instead";
            }
        });

        primaryAuthBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if(!email || !password) { alert("Please fill out all email credentials."); return; }

            loadingScreen.style.display = 'block';
            loginContainer.style.display = 'none';

            if(isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password)
                    .catch(err => { alert(err.message); loadingScreen.style.display = 'none'; loginContainer.style.display = 'block'; });
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch(err => { alert(err.message); loadingScreen.style.display = 'none'; loginContainer.style.display = 'block'; });
            }
        });

        // Google Authentication Endpoint Wrapper
        document.getElementById('google-login-btn').addEventListener('click', () => { 
            signInWithPopup(auth, provider).catch(err => {
                if (err.code === "auth/unauthorized-domain") {
                    alert("Firebase Error: Your current hosting domain or local folder structure path isn't authorized. Please view the running setup instructions provided above.");
                } else {
                    alert("Sign-In failed: " + err.message);
                }
            }); 
        });

        window.triggerLogoutSession = function() {
            signOut(auth).then(() => { location.reload(); });
        };

        // Global Auth State Tracking Manager Node
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, "users", user.uid));
                loadingScreen.style.display = 'none';
                if(snap.exists()) {
                    userDataRecord = snap.data();
                    launchDashboard(userDataRecord);
                } else { showProfileSetup(user); }
            } else {
                loadingScreen.style.display = 'none';
                loginContainer.style.display = 'block';
                dashboardContainer.style.display = 'none';
                profileSetupContainer.style.display = 'none';
            }
        });

        function showProfileSetup(user) {
            loginContainer.style.display = 'none';
            profileSetupContainer.style.display = 'block';
            if(user.displayName) document.getElementById('setup-name').value = user.displayName;
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('setup-name').value;
            const profileData = { uid: currentUser.uid, username, fullName, photoURL: currentUser.photoURL || "https://api.dicebear.com/7.x/bottts/svg?seed=" + username, friends: [] };
            await setDoc(doc(db, "users", currentUser.uid), profileData);
            userDataRecord = profileData;
            launchDashboard(profileData);
        });

        function launchDashboard(data) {
            profileSetupContainer.style.display = 'none';
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'flex';
            document.getElementById('dash-avatar').src = data.photoURL;
            document.getElementById('dash-display-name').innerText = data.fullName;
            document.getElementById('dash-username').innerText = "@" + data.username;
            
            onSnapshot(collection(db, "statuses"), (snapshot) => {
                activeStatusDatabase = {};
                snapshot.forEach(doc => { activeStatusDatabase[doc.id] = doc.data(); });
                loadFriendsSidebarList();
            });
        }

        // WhatsApp High Definition Local Object Mapping Engine for status
        statusFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const mediaUrlReference = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            setDoc(doc(db, "statuses", currentUser.uid), {
                uid: currentUser.uid,
                fullName: userDataRecord.fullName,
                photoURL: userDataRecord.photoURL,
                mediaUrl: mediaUrlReference,
                type: isVideo ? 'video' : 'image',
                timestamp: Date.now()
            });
        });

        // Fixed File Attachment Input Pipeline Hook
        chatImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileUrl = URL.createObjectURL(file);
            sendCustomPayload(file.type.startsWith('video/') ? 'video' : 'image', fileUrl);
        });

        // Fixed Interactive Microphone Voice Message Pipeline Engine Hook
        voiceRecordBtn.addEventListener('click', async () => {
            if (!mediaRecorder) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Audio device layers not accessible on this layout server.");
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        sendCustomPayload("voice", audioUrl);
                        stream.getTracks().forEach(track => track.stop());
                        mediaRecorder = null;
                        voiceRecordBtn.classList.remove('recording');
                    };
                    mediaRecorder.start();
                    voiceRecordBtn.classList.add('recording');
                } catch (err) { alert("Mic layer allocation failed: " + err.message); }
            } else {
                mediaRecorder.stop();
            }
        });

        async function sendCustomPayload(type, mediaLink) {
            if (!activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            await addDoc(collection(db, "messages", roomKey, "records"), {
                senderId: currentUser.uid,
                text: type === "text" ? messageInput.value.trim() : "",
                type: type,
                mediaUrl: mediaLink || "",
                timestamp: Date.now()
            });
            messageInput.value = "";
        }

        async function loadFriendsSidebarList() {
            friendsListElement.innerHTML = "";
            statusTray.innerHTML = "";
            let hasAnyVisibleStatus = false;
            const uids = userDataRecord.friends || [];

            if (activeStatusDatabase[currentUser.uid]) {
                createStatusTrayIcon(activeStatusDatabase[currentUser.uid]);
                hasAnyVisibleStatus = true;
            }

            for(let fUid of uids) {
                const fSnap = await getDoc(doc(db, "users", fUid));
                if(fSnap.exists()) {
                    const fData = fSnap.data();
                    if (activeStatusDatabase[fUid]) {
                        createStatusTrayIcon(activeStatusDatabase[fUid]);
                        hasAnyVisibleStatus = true;
                    }
                    const item = document.createElement('div');
                    item.className = 'friend-item';
                    item.innerHTML = `<img src="${fData.photoURL}"><div class="info"><h4>${fData.fullName}</h4><p>@${fData.username}</p></div>`;
                    item.addEventListener('click', () => openChatWindow(fData));
                    friendsListElement.appendChild(item);
                }
            }
            statusTray.style.display = hasAnyVisibleStatus ? 'flex' : 'none';
        }

        function createStatusTrayIcon(statusData) {
            const wrap = document.createElement('div');
            wrap.className = 'status-item';
            wrap.innerHTML = `<div class="status-avatar-wrap"><img src="${statusData.photoURL}"></div><span>${statusData.uid === currentUser.uid ? 'My Status' : statusData.fullName}</span>`;
            wrap.addEventListener('click', () => {
                document.getElementById('status-author-name').innerText = statusData.fullName;
                const imgEl = document.getElementById('status-viewer-img');
                const vidEl = document.getElementById('status-viewer-video');
                imgEl.style.display = 'none'; vidEl.style.display = 'none'; vidEl.pause();

                if (statusData.type === 'video') {
                    vidEl.src = statusData.mediaUrl; vidEl.style.display = 'block';
                } else {
                    imgEl.src = statusData.mediaUrl; imgEl.style.display = 'block';
                }
                document.getElementById('status-viewer-modal').style.display = 'flex';
            });
            statusTray.appendChild(wrap);
        }

        window.closeStatusViewer = function() {
            document.getElementById('status-viewer-video').pause();
            document.getElementById('status-viewer-modal').style.display = 'none';
        }

        function openChatWindow(friendData) {
            activeChatFriendData = friendData;
            document.getElementById('no-chat-fallback').style.display = 'none';
            document.getElementById('active-chat-window').style.display = 'flex';
            document.getElementById('chat-with-heading').innerText = friendData.fullName;
            dashboardContainer.classList.add('chat-active');

            const roomKey = currentUser.uid < friendData.uid ? `${currentUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentUser.uid}`;

            if(unsubscribeChatListener) unsubscribeChatListener();
            if(unsubscribeTypingListener) unsubscribeTypingListener();

            unsubscribeTypingListener = onSnapshot(doc(db, "typingStatus", roomKey), (docSnap) => {
                if(docSnap.exists() && docSnap.data()[friendData.uid]) { chatTypingIndicator.style.display = 'block'; } 
                else { chatTypingIndicator.style.display = 'none'; }
            });

            unsubscribeChatListener = onSnapshot(query(collection(db, "messages", roomKey, "records"), orderBy("timestamp", "asc")), (snapshot) => {
                messagesBox.innerHTML = "";
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    const bubble = document.createElement('div');
                    const isSent = msg.senderId === currentUser.uid;
                    bubble.className = `msg ${isSent ? 'sent' : 'received'}`;
                    
                    let innerTemplate = "";
                    if (msg.type === "image") {
                        innerTemplate = `<img src="${msg.mediaUrl}">`;
                    } else if (msg.type === "video") {
                        innerTemplate = `<video src="${msg.mediaUrl}" controls style="max-width:100%; max-height:200px; border-radius:10px;"></video>`;
                    } else if (msg.type === "voice") {
                        innerTemplate = `<audio src="${msg.mediaUrl}" controls></audio>`;
                    } else {
                        innerTemplate = `<p>${msg.text}</p>`;
                    }

                    bubble.innerHTML = `
                        ${innerTemplate}
                        <div class="msg-meta-row">
                            <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${isSent ? '<span class="whatsapp-status-ticks">✓✓</span>' : ''}
                        </div>
                    `;
                    messagesBox.appendChild(bubble);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        messageInput.addEventListener('input', () => {
            if(!activeChatFriendData) return;
            const roomKey = currentUser.uid < activeChatFriendData.uid ? `${currentUser.uid}_${activeChatFriendData.uid}` : `${activeChatFriendData.uid}_${currentUser.uid}`;
            setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: true }, { merge: true });
            clearTimeout(window.typingTimeoutEvent);
            window.typingTimeoutEvent = setTimeout(() => {
                setDoc(doc(db, "typingStatus", roomKey), { [currentUser.uid]: false }, { merge: true });
            }, 2000);
        });

        document.getElementById('send-msg-btn').addEventListener('click', () => sendCustomPayload("text", null));
        
        // Handle physical enter key clicks inside the message container row
        messageInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') { sendCustomPayload("text", null); }
        });

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const inputVal = document.getElementById('friend-username-input').value.trim().toLowerCase();
            const snap = await getDocs(query(collection(db, "users"), where("username", "==", inputVal)));
            if(!snap.empty) {
                const targetUid = snap.docs[0].data().uid;
                let currentFriendsList = userDataRecord.friends || [];
                if(!currentFriendsList.includes(targetUid)) {
                    currentFriendsList.push(targetUid);
                    await updateDoc(doc(db, "users", currentUser.uid), { friends: currentFriendsList });
                    userDataRecord.friends = currentFriendsList;
                    loadFriendsSidebarList();
                }
            }
            document.getElementById('friend-username-input').value = "";
        });

        window.exitChatToSidebar = function() { dashboardContainer.classList.remove('chat-active'); }
    </script>
</body>
</html>
